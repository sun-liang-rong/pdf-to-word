server {
    listen 80;
    server_name _;

    # === robots.txt 直接服务（最高优先级）===
    location = /robots.txt {
        alias /usr/local/html/pdf-to-word/frontend/public/robots.txt;
        access_log off;
        log_not_found off;
        default_type text/plain;
        expires 1d;
        add_header Cache-Control "public";
    }

    # === sitemap.xml 直接服务 ===
    location = /sitemap.xml {
        proxy_pass http://localhost:4444/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }

    # === og-image 长期缓存 ===
    location = /og-image.png {
        alias /usr/local/html/pdf-to-word/frontend/public/og-image.png;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # === manifest.json ===
    location = /manifest.json {
        alias /usr/local/html/pdf-to-word/frontend/public/manifest.json;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        default_type application/json;
    }

    # === Bing 和百度验证文件 ===
    location ~ ^/(BingSiteAuth\.xml|baidu_verify.*\.html)$ {
        root /usr/local/html/pdf-to-word/frontend/public;
        access_log off;
    }

    # === Next.js 静态资源（/_next/*）===
    location /_next/ {
        proxy_pass http://localhost:4444/_next/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # 长期缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
            proxy_pass http://localhost:4444;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # 前端 - 根路径
    location / {
        proxy_pass http://localhost:4444;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端 API - /api 路径
    location /api {
        proxy_pass http://localhost:4445;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        client_max_body_size 50M;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 健康检查
    location /health {
        proxy_pass http://localhost:4445/health;
        access_log off;
    }
}
