<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>

  <pattern id="grid2" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid2)"/>

  <circle cx="1100" cy="100" r="150" fill="#f59e0b" opacity="0.05"/>
  <circle cx="100" cy="530" r="200" fill="#fbbf24" opacity="0.05"/>

  <!-- Court/Justice Elements -->
  <g transform="translate(150, 150)" opacity="0.3">
    <rect x="20" y="0" width="10" height="80" fill="#f59e0b"/>
    <rect x="50" y="0" width="10" height="80" fill="#f59e0b"/>
    <rect x="0" y="70" width="80" height="10" fill="#f59e0b"/>
    <circle cx="40" cy="35" r="15" fill="none" stroke="#fbbf24" stroke-width="3"/>
  </g>

  <!-- AI Brain Network -->
  <g transform="translate(850, 100)" opacity="0.4">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="50" cy="50" r="20" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="20" cy="30" r="6" fill="#f59e0b"/>
    <circle cx="80" cy="30" r="6" fill="#fbbf24"/>
    <circle cx="20" cy="70" r="6" fill="#fbbf24"/>
    <circle cx="80" cy="70" r="6" fill="#f59e0b"/>
    <circle cx="50" cy="10" r="6" fill="#f59e0b"/>
    <circle cx="50" cy="90" r="6" fill="#fbbf24"/>
    <line x1="50" y1="30" x2="20" y2="30" stroke="#f59e0b" stroke-width="1"/>
    <line x1="50" y1="30" x2="80" y2="30" stroke="#f59e0b" stroke-width="1"/>
    <line x1="50" y1="70" x2="20" y2="70" stroke="#fbbf24" stroke-width="1"/>
    <line x1="50" y1="70" x2="80" y2="70" stroke="#fbbf24" stroke-width="1"/>
  </g>

  <!-- VS Symbol -->
  <g transform="translate(900, 380)" filter="url(#glow2)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="bold" fill="url(#accent2)" opacity="0.8">VS</text>
  </g>

  <!-- Document Icons -->
  <g transform="translate(150, 420)" opacity="0.6">
    <rect x="0" y="0" width="60" height="80" rx="4" fill="#334155"/>
    <rect x="10" y="15" width="40" height="4" fill="#64748b"/>
    <rect x="10" y="25" width="30" height="4" fill="#64748b"/>
    <rect x="10" y="35" width="35" height="4" fill="#64748b"/>
    <rect x="10" y="50" width="25" height="4" fill="#f59e0b"/>
  </g>

  <text x="600" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="bold" fill="#f8fafc">
    Musk vs Altman 审判首周
  </text>
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8">
    OpenAI 控制权之争进入法庭
  </text>
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">
    AGI 威胁论与商业利益交织
  </text>
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b">
    xAI 被曝蒸馏 OpenAI 模型
  </text>

  <rect x="520" y="440" width="160" height="40" rx="20" fill="url(#accent2)" opacity="0.9"/>
  <text x="600" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0f172a">
    AI NEWS • 20260507
  </text>
</svg>