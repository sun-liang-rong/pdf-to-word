<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="600" cy="315" r="200" fill="#3b82f6" opacity="0.05"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="157" x2="1200" y2="157" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="#3b82f6" stroke-width="1"/>
  </g>
  
  <!-- Image/Document icons -->
  <g transform="translate(150, 200)">
    <!-- Document -->
    <rect x="0" y="0" width="120" height="150" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <rect x="15" y="30" width="90" height="8" rx="4" fill="#3b82f6" opacity="0.6"/>
    <rect x="15" y="50" width="70" height="8" rx="4" fill="#64748b" opacity="0.6"/>
    <rect x="15" y="70" width="80" height="8" rx="4" fill="#64748b" opacity="0.6"/>
    <rect x="15" y="90" width="60" height="8" rx="4" fill="#64748b" opacity="0.6"/>
    <!-- Image icon -->
    <rect x="30" y="110" width="60" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="50" cy="125" r="5" fill="#8b5cf6"/>
    <path d="M 40 135 L 60 120 L 80 135" stroke="#8b5cf6" stroke-width="2" fill="none"/>
  </g>
  
  <!-- AI Brain icon -->
  <g transform="translate(900, 180)" filter="url(#glow1)">
    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#accent1)" stroke-width="3"/>
    <path d="M 60 20 Q 90 30 95 60 Q 90 90 60 95 Q 30 90 25 60 Q 30 30 60 20" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="60" cy="60" r="15" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="45" cy="45" r="5" fill="#3b82f6"/>
    <circle cx="75" cy="45" r="5" fill="#3b82f6"/>
    <circle cx="45" cy="75" r="5" fill="#3b82f6"/>
    <circle cx="75" cy="75" r="5" fill="#3b82f6"/>
    <line x1="60" y1="45" x2="60" y2="60" stroke="#3b82f6" stroke-width="2"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#f8fafc">
    AI图像生成技术
  </text>
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#cbd5e1">
    驱动应用增长新趋势
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">
    从聊天机器人到视觉创作，AI图像模型正在重塑内容生产
  </text>
  
  <!-- Date badge -->
  <rect x="540" y="450" width="120" height="35" rx="17" fill="#3b82f6" opacity="0.2"/>
  <text x="600" y="473" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3b82f6" font-weight="600">
    2026-05-05
  </text>
  
  <!-- Decorative lines -->
  <line x1="350" y1="500" x2="450" y2="500" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <line x1="750" y1="500" x2="850" y2="500" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
</svg>