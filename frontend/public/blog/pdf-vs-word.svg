<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="pdf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="200" cy="150" r="80" fill="#e74c3c" opacity="0.1"/>
  <circle cx="1000" cy="500" r="120" fill="#3498db" opacity="0.1"/>
  <circle cx="100" cy="550" r="60" fill="#f39c12" opacity="0.1"/>
  
  <!-- PDF 文档图标 -->
  <g transform="translate(350, 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="220" rx="8" fill="url(#pdf)"/>
    <rect x="20" y="20" width="140" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="45" width="100" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="20" y="65" width="120" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="20" y="85" width="90" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="20" y="105" width="110" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <text x="90" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">PDF</text>
  </g>
  
  <!-- Word 文档图标 -->
  <g transform="translate(670, 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="220" rx="8" fill="url(#word)"/>
    <rect x="20" y="20" width="140" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="45" width="100" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="20" y="65" width="120" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="20" y="85" width="90" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="20" y="105" width="110" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <text x="90" y="180" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">DOCX</text>
  </g>
  
  <!-- 对比符号 -->
  <g transform="translate(560, 300)">
    <circle cx="40" cy="0" r="30" fill="#f39c12" opacity="0.9"/>
    <text x="40" y="8" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">VS</text>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">
    PDF 与 Word 格式对比
  </text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">
    了解两种文档格式的区别与选择
  </text>
</svg>
