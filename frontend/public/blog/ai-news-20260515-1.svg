<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b2cbf"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#00d4ff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#00d4ff" stroke-width="1"/>
  </g>
  
  <!-- Neural network nodes -->
  <g filter="url(#glow)" opacity="0.6">
    <!-- Layer 1 -->
    <circle cx="150" cy="180" r="8" fill="#00d4ff"/>
    <circle cx="150" cy="300" r="8" fill="#00d4ff"/>
    <circle cx="150" cy="420" r="8" fill="#00d4ff"/>
    <!-- Layer 2 -->
    <circle cx="350" cy="140" r="10" fill="#7b2cbf"/>
    <circle cx="350" cy="250" r="10" fill="#7b2cbf"/>
    <circle cx="350" cy="360" r="10" fill="#7b2cbf"/>
    <circle cx="350" cy="470" r="10" fill="#7b2cbf"/>
    <!-- Layer 3 -->
    <circle cx="550" cy="100" r="12" fill="#00d4ff"/>
    <circle cx="550" cy="220" r="12" fill="#00d4ff"/>
    <circle cx="550" cy="340" r="12" fill="#00d4ff"/>
    <circle cx="550" cy="460" r="12" fill="#00d4ff"/>
    <circle cx="550" cy="520" r="12" fill="#00d4ff"/>
    <!-- Layer 4 -->
    <circle cx="750" cy="160" r="10" fill="#7b2cbf"/>
    <circle cx="750" cy="280" r="10" fill="#7b2cbf"/>
    <circle cx="750" cy="400" r="10" fill="#7b2cbf"/>
    <!-- Layer 5 -->
    <circle cx="950" cy="240" r="8" fill="#00d4ff"/>
    <circle cx="950" cy="360" r="8" fill="#00d4ff"/>
  </g>
  
  <!-- Connections -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.25">
    <line x1="150" y1="180" x2="350" y2="140"/>
    <line x1="150" y1="180" x2="350" y2="250"/>
    <line x1="150" y1="300" x2="350" y2="140"/>
    <line x1="150" y1="300" x2="350" y2="250"/>
    <line x1="150" y1="300" x2="350" y2="360"/>
    <line x1="150" y1="420" x2="350" y2="250"/>
    <line x1="150" y1="420" x2="350" y2="360"/>
    <line x1="150" y1="420" x2="350" y2="470"/>
    
    <line x1="350" y1="140" x2="550" y2="100"/>
    <line x1="350" y1="140" x2="550" y2="220"/>
    <line x1="350" y1="250" x2="550" y2="100"/>
    <line x1="350" y1="250" x2="550" y2="220"/>
    <line x1="350" y1="250" x2="550" y2="340"/>
    <line x1="350" y1="360" x2="550" y2="220"/>
    <line x1="350" y1="360" x2="550" y2="340"/>
    <line x1="350" y1="360" x2="550" y2="460"/>
    <line x1="350" y1="470" x2="550" y2="340"/>
    <line x1="350" y1="470" x2="550" y2="460"/>
    <line x1="350" y1="470" x2="550" y2="520"/>
    
    <line x1="550" y1="100" x2="750" y2="160"/>
    <line x1="550" y1="220" x2="750" y2="160"/>
    <line x1="550" y1="220" x2="750" y2="280"/>
    <line x1="550" y1="340" x2="750" y2="280"/>
    <line x1="550" y1="340" x2="750" y2="400"/>
    <line x1="550" y1="460" x2="750" y2="280"/>
    <line x1="550" y1="460" x2="750" y2="400"/>
    <line x1="550" y1="520" x2="750" y2="400"/>
    
    <line x1="750" y1="160" x2="950" y2="240"/>
    <line x1="750" y1="280" x2="950" y2="240"/>
    <line x1="750" y1="280" x2="950" y2="360"/>
    <line x1="750" y1="400" x2="950" y2="360"/>
  </g>
  
  <!-- Chip icon (center left) -->
  <g transform="translate(80, 280)" filter="url(#softGlow)">
    <rect x="0" y="0" width="100" height="100" rx="8" fill="none" stroke="#00d4ff" stroke-width="3"/>
    <rect x="15" y="15" width="70" height="70" rx="4" fill="none" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="50" y1="0" x2="50" y2="15" stroke="#00d4ff" stroke-width="2"/>
    <line x1="50" y1="85" x2="50" y2="100" stroke="#00d4ff" stroke-width="2"/>
    <line x1="0" y1="50" x2="15" y2="50" stroke="#00d4ff" stroke-width="2"/>
    <line x1="85" y1="50" x2="100" y2="50" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="50" cy="50" r="15" fill="#7b2cbf" opacity="0.5"/>
    <circle cx="50" cy="50" r="8" fill="#00d4ff"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#softGlow)">Cerebras 108% IPO</text>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#accentGradient)" text-anchor="middle" filter="url(#glow)">AI芯片革命</text>
  
  <!-- Subtitle -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="20" fill="#00d4ff" text-anchor="middle" opacity="0.8">深度解析全球最大AI芯片IPO背后的技术逻辑</text>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <polygon points="1100,100 1150,100 1125,140" fill="#7b2cbf"/>
    <polygon points="100,500 50,500 75,540" fill="#00d4ff"/>
    <circle cx="1080" cy="520" r="30" fill="none" stroke="#7b2cbf" stroke-width="2"/>
    <circle cx="1080" cy="520" r="20" fill="none" stroke="#00d4ff" stroke-width="1"/>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#0a0e27" opacity="0.9"/>
  
  <!-- Date -->
  <text x="60" y="605" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff">2026年5月15日</text>
  
  <!-- Tags -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#7b2cbf">
    <rect x="280" y="578" width="100" height="24" rx="12" fill="#7b2cbf" opacity="0.3"/>
    <text x="330" y="595" text-anchor="middle" fill="#e0d4ff">AI芯片</text>
    
    <rect x="400" y="578" width="100" height="24" rx="12" fill="#7b2cbf" opacity="0.3"/>
    <text x="450" y="595" text-anchor="middle" fill="#e0d4ff">Cerebras</text>
    
    <rect x="520" y="578" width="100" height="24" rx="12" fill="#7b2cbf" opacity="0.3"/>
    <text x="570" y="595" text-anchor="middle" fill="#e0d4ff">WaferScale</text>
    
    <rect x="640" y="578" width="100" height="24" rx="12" fill="#7b2cbf" opacity="0.3"/>
    <text x="690" y="595" text-anchor="middle" fill="#e0d4ff">IPO</text>
  </g>
  
  <!-- Author -->
  <text x="1140" y="605" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="end">Al磊</text>
</svg>