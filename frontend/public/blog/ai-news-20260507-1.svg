<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg1)"/>

  <pattern id="grid1" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid1)"/>

  <circle cx="100" cy="100" r="150" fill="#10b981" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="#34d399" opacity="0.05"/>

  <!-- DeepSeek Logo Style Element -->
  <g transform="translate(150, 150)" opacity="0.3">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#10b981" stroke-width="2"/>
    <circle cx="50" cy="50" r="25" fill="none" stroke="#34d399" stroke-width="2"/>
    <circle cx="50" cy="50" r="10" fill="#10b981"/>
    <line x1="50" y1="10" x2="50" y2="25" stroke="#10b981" stroke-width="2"/>
    <line x1="50" y1="75" x2="50" y2="90" stroke="#10b981" stroke-width="2"/>
    <line x1="10" y1="50" x2="25" y2="50" stroke="#10b981" stroke-width="2"/>
    <line x1="75" y1="50" x2="90" y2="50" stroke="#10b981" stroke-width="2"/>
  </g>

  <!-- Money/Growth Icons -->
  <g transform="translate(900, 120)" filter="url(#glow1)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="80" fill="url(#accent1)" opacity="0.6">$</text>
  </g>

  <g transform="translate(850, 400)" opacity="0.4">
    <rect x="0" y="60" width="20" height="40" fill="#10b981" rx="2"/>
    <rect x="25" y="40" width="20" height="60" fill="#34d399" rx="2"/>
    <rect x="50" y="20" width="20" height="80" fill="#10b981" rx="2"/>
    <rect x="75" y="0" width="20" height="100" fill="#34d399" rx="2"/>
    <polyline points="10,60 35,40 60,20 85,0" fill="none" stroke="#10b981" stroke-width="2"/>
  </g>

  <!-- Document Icon -->
  <g transform="translate(150, 420)" opacity="0.6">
    <rect x="0" y="0" width="60" height="80" rx="4" fill="#334155"/>
    <rect x="10" y="15" width="40" height="4" fill="#64748b"/>
    <rect x="10" y="25" width="30" height="4" fill="#64748b"/>
    <rect x="10" y="35" width="35" height="4" fill="#64748b"/>
    <rect x="10" y="50" width="25" height="4" fill="#10b981"/>
  </g>

  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#f8fafc">
    DeepSeek 估值突破 450 亿美元
  </text>
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8">
    首轮融资创纪录，中国AI独角兽崛起
  </text>
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">
    开源模型挑战全球AI格局
  </text>

  <rect x="520" y="430" width="160" height="40" rx="20" fill="url(#accent1)" opacity="0.9"/>
  <text x="600" y="457" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0f172a">
    AI NEWS • 20260507
  </text>
</svg>