<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰元素 -->
  <circle cx="100" cy="100" r="80" fill="#3498db" opacity="0.1"/>
  <circle cx="1100" cy="530" r="100" fill="#e74c3c" opacity="0.1"/>
  <circle cx="200" cy="550" r="60" fill="#f39c12" opacity="0.1"/>
  <circle cx="1000" cy="150" r="70" fill="#27ae60" opacity="0.1"/>
  
  <!-- 文档图标组 -->
  <g transform="translate(400, 120)" filter="url(#shadow)">
    <!-- 文档1 -->
    <rect x="0" y="40" width="140" height="180" rx="8" fill="#e74c3c" opacity="0.8"/>
    <rect x="15" y="60" width="110" height="8" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="15" y="80" width="90" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="15" y="100" width="100" height="6" rx="2" fill="#fff" opacity="0.3"/>
    
    <!-- 文档2 -->
    <rect x="80" y="0" width="140" height="180" rx="8" fill="#3498db" opacity="0.9"/>
    <rect x="95" y="20" width="110" height="8" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="95" y="40" width="90" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="95" y="60" width="100" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="95" y="80" width="80" height="6" rx="2" fill="#fff" opacity="0.3"/>
    
    <!-- 文档3 -->
    <rect x="160" y="60" width="140" height="180" rx="8" fill="#27ae60" opacity="0.8"/>
    <rect x="175" y="80" width="110" height="8" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="175" y="100" width="90" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="175" y="120" width="100" height="6" rx="2" fill="#fff" opacity="0.3"/>
  </g>
  
  <!-- 工具图标 -->
  <g transform="translate(850, 180)">
    <circle cx="60" cy="60" r="50" fill="#f39c12" opacity="0.9" filter="url(#shadow)"/>
    <text x="60" y="75" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">🛠️</text>
  </g>
  
  <!-- 标题区域 -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#fff" text-anchor="middle">
    PDF 转换器博客
  </text>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">
    文档处理技巧与教程
  </text>
  
  <!-- 装饰线条 -->
  <line x1="400" y1="530" x2="800" y2="530" stroke="#3498db" stroke-width="2" opacity="0.5"/>
</svg>
