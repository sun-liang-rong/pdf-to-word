<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1" stroke="#3b82f6" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>
  
  <!-- Robot/Humanoid figure -->
  <g transform="translate(900, 180)" filter="url(#glow)">
    <!-- Head -->
    <rect x="40" y="0" width="80" height="70" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <!-- Eyes -->
    <rect x="55" y="25" width="20" height="8" rx="2" fill="#3b82f6"/>
    <rect x="85" y="25" width="20" height="8" rx="2" fill="#3b82f6"/>
    <!-- Body -->
    <rect x="30" y="80" width="100" height="120" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <!-- Chest panel -->
    <rect x="50" y="100" width="60" height="40" rx="5" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="65" cy="120" r="5" fill="#3b82f6"/>
    <circle cx="80" cy="120" r="5" fill="#8b5cf6"/>
    <circle cx="95" cy="120" r="5" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-10" y="90" width="30" height="80" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <rect x="140" y="90" width="30" height="80" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <!-- Neural network lines -->
    <line x1="80" y1="140" x2="80" y2="250" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <circle cx="80" cy="250" r="8" fill="#8b5cf6" opacity="0.8"/>
    <line x1="80" y1="250" x2="40" y2="300" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="80" y1="250" x2="120" y2="300" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Meta logo stylized -->
  <g transform="translate(150, 150)" opacity="0.15">
    <path d="M0,50 Q25,0 50,50 Q75,100 100,50" fill="none" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Circuit pattern -->
  <g opacity="0.2">
    <circle cx="200" cy="450" r="30" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="200" cy="450" r="50" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <line x1="200" y1="400" x2="200" y2="350" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="200" cy="350" r="5" fill="#3b82f6"/>
    
    <circle cx="1000" cy="500" r="25" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="1000" y1="475" x2="1000" y2="430" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="1000" cy="430" r="4" fill="#8b5cf6"/>
  </g>
  
  <!-- Main title area -->
  <g transform="translate(60, 200)">
    <!-- Category tag -->
    <rect x="0" y="0" width="120" height="32" rx="16" fill="url(#accentGradient)"/>
    <text x="60" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">AI Robotics</text>
    
    <!-- Title -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="white">
      <tspan x="0" dy="0">Meta收购机器人公司</tspan>
      <tspan x="0" dy="55">加速人形AI布局</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="190" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">
      AI从数字世界向物理世界扩展的重要里程碑
    </text>
    
    <!-- Date and source -->
    <text x="0" y="250" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
      2026年5月2日 · 来源: TechCrunch
    </text>
  </g>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accentGradient)"/>
</svg>