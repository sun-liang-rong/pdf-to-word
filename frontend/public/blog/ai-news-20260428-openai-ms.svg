<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="openai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f"/>
      <stop offset="100%" style="stop-color:#19c59f"/>
    </linearGradient>
    <linearGradient id="azure" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#106ebe"/>
    </linearGradient>
    <linearGradient id="aws" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900"/>
      <stop offset="100%" style="stop-color:#ec7211"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰元素 -->
  <circle cx="150" cy="100" r="80" fill="#10a37f" opacity="0.1"/>
  <circle cx="1050" cy="530" r="100" fill="#0078d4" opacity="0.1"/>
  <circle cx="100" cy="550" r="60" fill="#ff9900" opacity="0.1"/>
  
  <!-- OpenAI 图标 -->
  <g transform="translate(280, 180)" filter="url(#glow)">
    <!-- 六边形 -->
    <polygon points="60,10 110,35 110,85 60,110 10,85 10,35" 
             fill="none" stroke="url(#openai)" stroke-width="3" opacity="0.8"/>
    <!-- 内部图案 -->
    <circle cx="60" cy="60" r="25" fill="none" stroke="#10a37f" stroke-width="2"/>
    <circle cx="60" cy="60" r="15" fill="#10a37f" opacity="0.6"/>
    <text x="60" y="65" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">AI</text>
  </g>
  
  <!-- Microsoft Azure 图标 -->
  <g transform="translate(520, 180)" filter="url(#glow)">
    <!-- Azure 风格四边形 -->
    <path d="M10,30 L50,10 L90,30 L50,110 Z" fill="none" stroke="url(#azure)" stroke-width="3" opacity="0.8"/>
    <path d="M10,30 L50,110 L30,70 Z" fill="#0078d4" opacity="0.3"/>
    <path d="M50,10 L90,30 L50,110 Z" fill="#0078d4" opacity="0.5"/>
    <!-- Azure A -->
    <text x="50" y="80" font-family="Arial" font-size="20" font-weight="bold" fill="#0078d4" text-anchor="middle">A</text>
  </g>
  
  <!-- 断开符号 -->
  <g transform="translate(420, 230)">
    <line x1="0" y1="20" x2="60" y2="20" stroke="#e74c3c" stroke-width="4" stroke-dasharray="10,5"/>
    <text x="30" y="50" font-family="Arial" font-size="14" fill="#e74c3c" text-anchor="middle">合作结束</text>
  </g>
  
  <!-- AWS 图标 -->
  <g transform="translate(760, 180)" filter="url(#glow)">
    <!-- AWS 风格 -->
    <rect x="10" y="20" width="80" height="80" rx="10" fill="none" stroke="url(#aws)" stroke-width="3" opacity="0.8"/>
    <!-- AWS -->
    <text x="50" y="55" font-family="Arial" font-size="18" font-weight="bold" fill="#ff9900" text-anchor="middle">AWS</text>
    <text x="50" y="75" font-family="Arial" font-size="10" fill="#ec7211" text-anchor="middle">Amazon</text>
    <!-- 新合作箭头 -->
    <path d="M-20,50 L-60,50 L-50,40 M-60,50 L-50,60" stroke="#27ae60" stroke-width="3" fill="none"/>
  </g>
  
  <!-- 云服务图标组 -->
  <g transform="translate(900, 200)">
    <rect x="0" y="0" width="120" height="140" rx="10" fill="#fff" opacity="0.1" stroke="#fff" stroke-width="1"/>
    <!-- 云 -->
    <path d="M30,50 Q20,30 40,30 Q50,10 70,30 Q90,20 90,40 Q100,50 80,60 L40,60 Q20,60 30,50" 
          fill="none" stroke="#fff" stroke-width="2" opacity="0.6"/>
    <!-- 服务器 -->
    <rect x="30" y="70" width="60" height="8" rx="2" fill="#10a37f" opacity="0.6"/>
    <rect x="30" y="85" width="60" height="8" rx="2" fill="#0078d4" opacity="0.6"/>
    <rect x="30" y="100" width="60" height="8" rx="2" fill="#ff9900" opacity="0.6"/>
    <text x="60" y="130" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">多云时代</text>
  </g>
  
  <!-- 新闻标签 -->
  <g transform="translate(480, 420)">
    <rect x="0" y="0" width="240" height="50" rx="25" fill="#e74c3c" opacity="0.9"/>
    <text x="120" y="33" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">🔥 独家合作结束</text>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#fff" text-anchor="middle">
    OpenAI 与 Microsoft 结束独家合作
  </text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">
    AI 产业格局迎来重大转变
  </text>
</svg>
