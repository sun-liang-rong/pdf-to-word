<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b69;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Gradient -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    
    <!-- Purple Glow -->
    <radialGradient id="purpleGlow" cx="70%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </radialGradient>
    
    <!-- Cyan Glow -->
    <radialGradient id="cyanGlow" cx="30%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </radialGradient>
    
    <!-- Neural Network Glow -->
    <radialGradient id="neuralGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filter for glow effects -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Ambient Glows -->
  <ellipse cx="900" cy="150" rx="400" ry="300" fill="url(#purpleGlow)" />
  <ellipse cx="300" cy="480" rx="350" ry="250" fill="url(#cyanGlow)" />
  <ellipse cx="600" cy="315" rx="500" ry="350" fill="url(#neuralGlow)" />
  
  <!-- Neural Network Background Pattern -->
  <g opacity="0.15">
    <!-- Nodes -->
    <circle cx="150" cy="120" r="4" fill="#00d4ff"/>
    <circle cx="280" cy="80" r="3" fill="#a855f7"/>
    <circle cx="420" cy="150" r="4" fill="#00d4ff"/>
    <circle cx="580" cy="90" r="3" fill="#a855f7"/>
    <circle cx="720" cy="130" r="4" fill="#00d4ff"/>
    <circle cx="850" cy="70" r="3" fill="#a855f7"/>
    <circle cx="980" cy="140" r="4" fill="#00d4ff"/>
    
    <circle cx="100" cy="280" r="3" fill="#a855f7"/>
    <circle cx="250" cy="250" r="4" fill="#00d4ff"/>
    <circle cx="400" cy="320" r="3" fill="#a855f7"/>
    <circle cx="550" cy="270" r="4" fill="#00d4ff"/>
    <circle cx="700" cy="340" r="3" fill="#a855f7"/>
    <circle cx="850" cy="290" r="4" fill="#00d4ff"/>
    <circle cx="1000" cy="350" r="3" fill="#a855f7"/>
    
    <circle cx="150" cy="450" r="4" fill="#00d4ff"/>
    <circle cx="300" cy="400" r="3" fill="#a855f7"/>
    <circle cx="450" cy="480" r="4" fill="#00d4ff"/>
    <circle cx="600" cy="430" r="3" fill="#a855f7"/>
    <circle cx="750" cy="500" r="4" fill="#00d4ff"/>
    <circle cx="900" cy="450" r="3" fill="#a855f7"/>
    <circle cx="1050" cy="520" r="4" fill="#00d4ff"/>
    
    <!-- Connections -->
    <line x1="150" y1="120" x2="280" y2="80" stroke="#00d4ff" stroke-width="1"/>
    <line x1="280" y1="80" x2="420" y2="150" stroke="#a855f7" stroke-width="1"/>
    <line x1="420" y1="150" x2="580" y2="90" stroke="#00d4ff" stroke-width="1"/>
    <line x1="580" y1="90" x2="720" y2="130" stroke="#a855f7" stroke-width="1"/>
    <line x1="720" y1="130" x2="850" y2="70" stroke="#00d4ff" stroke-width="1"/>
    <line x1="850" y1="70" x2="980" y2="140" stroke="#a855f7" stroke-width="1"/>
    
    <line x1="100" y1="280" x2="250" y2="250" stroke="#a855f7" stroke-width="1"/>
    <line x1="250" y1="250" x2="400" y2="320" stroke="#00d4ff" stroke-width="1"/>
    <line x1="400" y1="320" x2="550" y2="270" stroke="#a855f7" stroke-width="1"/>
    <line x1="550" y1="270" x2="700" y2="340" stroke="#00d4ff" stroke-width="1"/>
    <line x1="700" y1="340" x2="850" y2="290" stroke="#a855f7" stroke-width="1"/>
    <line x1="850" y1="290" x2="1000" y2="350" stroke="#00d4ff" stroke-width="1"/>
    
    <line x1="150" y1="450" x2="300" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="300" y1="400" x2="450" y2="480" stroke="#a855f7" stroke-width="1"/>
    <line x1="450" y1="480" x2="600" y2="430" stroke="#00d4ff" stroke-width="1"/>
    <line x1="600" y1="430" x2="750" y2="500" stroke="#a855f7" stroke-width="1"/>
    <line x1="750" y1="500" x2="900" y2="450" stroke="#00d4ff" stroke-width="1"/>
    <line x1="900" y1="450" x2="1050" y2="520" stroke="#a855f7" stroke-width="1"/>
    
    <!-- Vertical connections -->
    <line x1="280" y1="80" x2="250" y2="250" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
    <line x1="580" y1="90" x2="550" y2="270" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
    <line x1="850" y1="70" x2="850" y2="290" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
    <line x1="300" y1="400" x2="250" y2="250" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
    <line x1="600" y1="430" x2="550" y2="270" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Decorative Geometric Elements -->
  <g opacity="0.1">
    <polygon points="600,50 650,150 550,150" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="700,200 750,300 650,300" fill="none" stroke="#a855f7" stroke-width="2"/>
    <polygon points="500,350 550,450 450,450" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="800,350 850,450 750,450" fill="none" stroke="#a855f7" stroke-width="2"/>
    <polygon points="600,500 650,600 550,600" fill="none" stroke="#00d4ff" stroke-width="2"/>
  </g>
  
  <!-- Hexagon Decorations -->
  <g opacity="0.08">
    <polygon points="120,200 140,180 160,200 160,240 140,260 120,240" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="1080,180 1100,160 1120,180 1120,220 1100,240 1080,220" fill="none" stroke="#a855f7" stroke-width="2"/>
    <polygon points="100,420 120,400 140,420 140,460 120,480 100,460" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="1100,400 1120,380 1140,400 1140,440 1120,460 1100,440" fill="none" stroke="#a855f7" stroke-width="2"/>
  </g>
  
  <!-- Floating Particles -->
  <g opacity="0.4">
    <circle cx="200" cy="100" r="2" fill="#00d4ff">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="80" r="2" fill="#a855f7">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="350" r="1.5" fill="#00d4ff">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="380" r="1.5" fill="#a855f7">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="550" r="2" fill="#00d4ff">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="530" r="2" fill="#a855f7">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Main Title Area -->
  <g filter="url(#softGlow)">
    <!-- Title Background Bar -->
    <rect x="100" y="180" width="1000" height="200" rx="20" fill="rgba(10, 14, 39, 0.6)" stroke="rgba(0, 212, 255, 0.3)" stroke-width="1"/>
  </g>
  
  <!-- Decorative Line Above Title -->
  <line x1="150" y1="170" x2="1050" y2="170" stroke="url(#bgGradient)" stroke-width="2"/>
  <line x1="150" y1="170" x2="300" y2="170" stroke="#00d4ff" stroke-width="2"/>
  <line x1="900" y1="170" x2="1050" y2="170" stroke="#a855f7" stroke-width="2"/>
  
  <!-- Main Title -->
  <text x="600" y="260" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    多模态大模型
  </text>
  <text x="600" y="320" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="600" fill="#00d4ff" text-anchor="middle">
    文档理解技术革命
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="380" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="300">
    Document AI × 视觉语言模型 × 结构化信息提取
  </text>
  
  <!-- Decorative Icons -->
  <g transform="translate(180, 240)" opacity="0.6">
    <rect x="0" y="0" width="40" height="50" rx="4" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <line x1="8" y1="12" x2="32" y2="12" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="8" y1="20" x2="28" y2="20" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="8" y1="28" x2="30" y2="28" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="8" y1="36" x2="24" y2="36" stroke="#00d4ff" stroke-width="1.5"/>
  </g>
  
  <g transform="translate(1020, 240)" opacity="0.6">
    <rect x="0" y="0" width="40" height="50" rx="4" fill="none" stroke="#a855f7" stroke-width="2"/>
    <line x1="8" y1="12" x2="32" y2="12" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="8" y1="20" x2="28" y2="20" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="8" y1="28" x2="30" y2="28" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="8" y1="36" x2="24" y2="36" stroke="#a855f7" stroke-width="1.5"/>
  </g>
  
  <!-- Central AI Icon -->
  <g transform="translate(570, 200)" opacity="0.25">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="30" cy="30" r="15" fill="none" stroke="#a855f7" stroke-width="1"/>
    <circle cx="30" cy="30" r="5" fill="#00d4ff"/>
    <line x1="30" y1="5" x2="30" y2="55" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="5" y1="30" x2="55" y2="30" stroke="#a855f7" stroke-width="0.5"/>
  </g>
  
  <!-- Bottom Section -->
  <rect x="0" y="520" width="1200" height="110" fill="rgba(10, 14, 39, 0.85)"/>
  
  <!-- Bottom Decorative Line -->
  <line x1="0" y1="520" x2="1200" y2="520" stroke="rgba(0, 212, 255, 0.3)" stroke-width="1"/>
  
  <!-- Date -->
  <text x="60" y="560" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#00d4ff" font-weight="500">
    📅 2026年5月17日
  </text>
  
  <!-- Tags -->
  <g transform="translate(60, 585)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="rgba(0, 212, 255, 0.15)" stroke="#00d4ff" stroke-width="1"/>
    <text x="65" y="19" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle">Document AI</text>
    
    <rect x="145" y="0" width="110" height="28" rx="14" fill="rgba(168, 85, 247, 0.15)" stroke="#a855f7" stroke-width="1"/>
    <text x="200" y="19" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle">多模态模型</text>
    
    <rect x="270" y="0" width="100" height="28" rx="14" fill="rgba(6, 182, 212, 0.15)" stroke="#06b6d4" stroke-width="1"/>
    <text x="320" y="19" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#06b6d4" text-anchor="middle">OCR技术</text>
    
    <rect x="390" y="0" width="110" height="28" rx="14" fill="rgba(139, 92, 246, 0.15)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="445" y="19" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle">信息提取</text>
  </g>
  
  <!-- Author -->
  <text x="1140" y="560" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="end">
    Author
  </text>
  <text x="1140" y="585" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="end" font-weight="600">
    Al磊
  </text>
  
  <!-- Corner Decorations -->
  <g opacity="0.3">
    <path d="M0 0 L50 0 L50 10 L10 10 L10 50 L0 50 Z" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M1200 0 L1150 0 L1150 10 L1190 10 L1190 50 L1200 50 Z" fill="none" stroke="#a855f7" stroke-width="2"/>
    <path d="M0 630 L50 630 L50 620 L10 620 L10 580 L0 580 Z" fill="none" stroke="#a855f7" stroke-width="2"/>
    <path d="M1200 630 L1150 630 L1150 620 L1190 620 L1190 580 L1200 580 Z" fill="none" stroke="#00d4ff" stroke-width="2"/>
  </g>
  
  <!-- Pulse Animation for center -->
  <circle cx="600" cy="315" r="180" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2">
    <animate attributeName="r" values="150;200;150" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>