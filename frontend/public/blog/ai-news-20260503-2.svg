<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252550;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8e8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="100" fill="#00d4aa" opacity="0.08"/>
  <circle cx="1050" cy="480" r="150" fill="#00a8e8" opacity="0.1"/>
  
  <!-- Sound wave visualization -->
  <g transform="translate(100, 315)" opacity="0.4">
    <rect x="0" y="-80" width="8" height="160" rx="4" fill="#00d4aa"/>
    <rect x="20" y="-60" width="8" height="120" rx="4" fill="#00d4aa"/>
    <rect x="40" y="-100" width="8" height="200" rx="4" fill="#00d4aa"/>
    <rect x="60" y="-40" width="8" height="80" rx="4" fill="#00d4aa"/>
    <rect x="80" y="-120" width="8" height="240" rx="4" fill="#00d4aa"/>
    <rect x="100" y="-70" width="8" height="140" rx="4" fill="#00d4aa"/>
    <rect x="120" y="-90" width="8" height="180" rx="4" fill="#00d4aa"/>
  </g>
  
  <g transform="translate(980, 315)" opacity="0.4">
    <rect x="0" y="-90" width="8" height="180" rx="4" fill="#00a8e8"/>
    <rect x="20" y="-50" width="8" height="100" rx="4" fill="#00a8e8"/>
    <rect x="40" y="-110" width="8" height="220" rx="4" fill="#00a8e8"/>
    <rect x="60" y="-30" width="8" height="60" rx="4" fill="#00a8e8"/>
    <rect x="80" y="-100" width="8" height="200" rx="4" fill="#00a8e8"/>
    <rect x="100" y="-60" width="8" height="120" rx="4" fill="#00a8e8"/>
  </g>
  
  <!-- Microphone icon -->
  <g transform="translate(520, 120)" opacity="0.9">
    <rect x="40" y="40" width="40" height="70" rx="20" fill="none" stroke="url(#accentGrad2)" stroke-width="3"/>
    <path d="M 30 80 Q 30 120 60 120 Q 90 120 90 80" fill="none" stroke="url(#accentGrad2)" stroke-width="3"/>
    <line x1="60" y1="120" x2="60" y2="140" stroke="url(#accentGrad2)" stroke-width="3"/>
    <line x1="45" y1="140" x2="75" y2="140" stroke="url(#accentGrad2)" stroke-width="3"/>
    <!-- Sound waves from mic -->
    <path d="M 100 50 Q 120 60 100 70" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.6"/>
    <path d="M 110 40 Q 140 60 110 80" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Text/document lines -->
  <g transform="translate(850, 200)" opacity="0.3">
    <rect x="0" y="0" width="200" height="8" rx="4" fill="#ffffff"/>
    <rect x="0" y="25" width="160" height="6" rx="3" fill="#ffffff"/>
    <rect x="0" y="45" width="180" height="6" rx="3" fill="#ffffff"/>
    <rect x="0" y="65" width="140" height="6" rx="3" fill="#ffffff"/>
    <rect x="0" y="85" width="170" height="6" rx="3" fill="#ffffff"/>
  </g>
  
  <!-- Title text -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="bold" fill="#ffffff" filter="url(#glow2)">
    AI语音转文字应用
  </text>
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="bold" fill="#ffffff">
    全面评测与排名
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a0a0a0">
    提升办公效率的最佳AI口述工具推荐
  </text>
  
  <!-- Date and source -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#666">
    2026-05-03 · TechCrunch
  </text>
  
  <!-- Category tag -->
  <rect x="540" y="570" width="120" height="30" rx="15" fill="url(#accentGrad2)"/>
  <text x="600" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" font-weight="600">AI工具</text>
</svg>