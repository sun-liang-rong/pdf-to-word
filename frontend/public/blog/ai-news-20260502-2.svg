<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Security shield pattern -->
  <g opacity="0.08" stroke="#10b981" stroke-width="1">
    <path d="M100,100 L150,80 L200,100 L200,150 L150,170 L100,150 Z" fill="none"/>
    <path d="M300,200 L350,180 L400,200 L400,250 L350,270 L300,250 Z" fill="none"/>
    <path d="M500,80 L550,60 L600,80 L600,130 L550,150 L500,130 Z" fill="none"/>
    <path d="M700,300 L750,280 L800,300 L800,350 L750,370 L700,350 Z" fill="none"/>
    <path d="M900,150 L950,130 L1000,150 L1000,200 L950,220 L900,200 Z" fill="none"/>
  </g>
  
  <!-- Network nodes -->
  <g opacity="0.15" stroke="#3b82f6" stroke-width="1">
    <circle cx="150" cy="500" r="40" fill="none"/>
    <circle cx="150" cy="500" r="60" fill="none"/>
    <circle cx="150" cy="500" r="80" fill="none"/>
    
    <circle cx="1050" cy="450" r="35" fill="none"/>
    <circle cx="1050" cy="450" r="55" fill="none"/>
    
    <!-- Connection lines -->
    <line x1="190" y1="500" x2="350" y2="400" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <line x1="1015" y1="450" x2="850" y2="380" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Pentagon symbol stylized -->
  <g transform="translate(900, 150)" filter="url(#glow)" opacity="0.9">
    <polygon points="80,0 160,40 140,120 20,120 0,40" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
    <text x="80" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981" text-anchor="middle">五角大楼</text>
  </g>
  
  <!-- Tech company logos area -->
  <g transform="translate(850, 320)" opacity="0.8">
    <!-- Nvidia -->
    <rect x="0" y="0" width="80" height="50" rx="8" fill="#1e293b" stroke="#76b900" stroke-width="2"/>
    <text x="40" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#76b900" text-anchor="middle">NVIDIA</text>
    
    <!-- Microsoft -->
    <rect x="100" y="0" width="80" height="50" rx="8" fill="#1e293b" stroke="#00a4ef" stroke-width="2"/>
    <text x="140" y="32" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00a4ef" text-anchor="middle">Azure</text>
    
    <!-- AWS -->
    <rect x="200" y="0" width="80" height="50" rx="8" fill="#1e293b" stroke="#ff9900" stroke-width="2"/>
    <text x="240" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9900" text-anchor="middle">AWS</text>
  </g>
  
  <!-- Security lock icon -->
  <g transform="translate(150, 400)" opacity="0.2">
    <rect x="20" y="40" width="60" height="50" rx="5" fill="none" stroke="#10b981" stroke-width="4"/>
    <path d="M30,40 L30,25 C30,10 40,0 50,0 C60,0 70,10 70,25 L70,40" fill="none" stroke="#10b981" stroke-width="4"/>
  </g>
  
  <!-- Main title area -->
  <g transform="translate(60, 180)">
    <!-- Category tag -->
    <rect x="0" y="0" width="100" height="32" rx="16" fill="url(#accentGradient)"/>
    <text x="50" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">AI安全</text>
    
    <!-- Title -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="white">
      <tspan x="0" dy="0">五角大楼与科技巨头合作</tspan>
      <tspan x="0" dy="50">在机密网络部署AI</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="190" font-family="Arial, sans-serif" font-size="17" fill="#94a3b8">
      AI技术在政府安全和国防领域的深度应用
    </text>
    
    <!-- Date and source -->
    <text x="0" y="250" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
      2026年5月2日 · 来源: TechCrunch
    </text>
  </g>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accentGradient)"/>
  
  <!-- Classified badge -->
  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="140" height="36" rx="4" fill="#dc2626" opacity="0.9"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">机密网络部署</text>
  </g>
</svg>