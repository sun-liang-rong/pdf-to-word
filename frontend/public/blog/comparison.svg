<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="100" cy="100" r="70" fill="#e74c3c" opacity="0.1"/>
  <circle cx="1100" cy="530" r="90" fill="#3498db" opacity="0.1"/>
  <circle cx="200" cy="550" r="50" fill="#f39c12" opacity="0.1"/>
  
  <!-- 对比表格背景 -->
  <g transform="translate(250, 120)" filter="url(#shadow)">
    <!-- 表头 -->
    <rect x="0" y="0" width="700" height="60" rx="8" fill="#3498db" opacity="0.9"/>
    <text x="150" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">工具 A</text>
    <text x="350" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">特性</text>
    <text x="550" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">工具 B</text>
    
    <!-- 行 1 -->
    <rect x="0" y="70" width="700" height="50" fill="#fff" opacity="0.05"/>
    <text x="150" y="100" font-family="Arial, sans-serif" font-size="14" fill="#27ae60" text-anchor="middle">✓ 支持</text>
    <text x="350" y="100" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">批量处理</text>
    <text x="550" y="100" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c" text-anchor="middle">✗ 不支持</text>
    
    <!-- 行 2 -->
    <rect x="0" y="130" width="700" height="50" fill="#fff" opacity="0.02"/>
    <text x="150" y="160" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c" text-anchor="middle">✗ 不支持</text>
    <text x="350" y="160" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">OCR 识别</text>
    <text x="550" y="160" font-family="Arial, sans-serif" font-size="14" fill="#27ae60" text-anchor="middle">✓ 支持</text>
    
    <!-- 行 3 -->
    <rect x="0" y="190" width="700" height="50" fill="#fff" opacity="0.05"/>
    <text x="150" y="220" font-family="Arial, sans-serif" font-size="14" fill="#27ae60" text-anchor="middle">免费</text>
    <text x="350" y="220" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">价格</text>
    <text x="550" y="220" font-family="Arial, sans-serif" font-size="14" fill="#f39c12" text-anchor="middle">付费</text>
    
    <!-- 行 4 -->
    <rect x="0" y="250" width="700" height="50" fill="#fff" opacity="0.02"/>
    <text x="150" y="280" font-family="Arial, sans-serif" font-size="14" fill="#27ae60" text-anchor="middle">快</text>
    <text x="350" y="280" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">速度</text>
    <text x="550" y="280" font-family="Arial, sans-serif" font-size="14" fill="#27ae60" text-anchor="middle">快</text>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">
    PDF 工具对比评测
  </text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">
    帮你选择最适合的解决方案
  </text>
</svg>
