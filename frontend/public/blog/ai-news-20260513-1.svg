<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b3e;stop-opacity:1" />
    </linearGradient>
    
    <!-- 科技感光晕 -->
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.1)" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- 光晕效果 -->
  <ellipse cx="360" cy="200" rx="300" ry="300" fill="url(#glow1)"/>
  <ellipse cx="840" cy="430" rx="350" ry="350" fill="url(#glow2)"/>
  
  <!-- 网络节点装饰 -->
  <g stroke="rgba(139,92,246,0.3)" stroke-width="1" fill="none">
    <!-- 节点连线 -->
    <line x1="100" y1="100" x2="200" y2="180"/>
    <line x1="200" y1="180" x2="350" y2="120"/>
    <line x1="350" y1="120" x2="500" y2="200"/>
    <line x1="500" y1="200" x2="700" y2="150"/>
    <line x1="700" y1="150" x2="900" y2="220"/>
    <line x1="900" y1="220" x2="1050" y2="160"/>
    <line x1="1050" y1="160" x2="1100" y2="280"/>
    
    <line x1="150" y1="450" x2="300" y2="500"/>
    <line x1="300" y1="500" x2="500" y2="420"/>
    <line x1="500" y1="420" x2="750" y2="480"/>
    <line x1="750" y1="480" x2="950" y2="400"/>
    <line x1="950" y1="400" x2="1100" y2="480"/>
    
    <line x1="80" y1="300" x2="250" y2="350"/>
    <line x1="250" y1="350" x2="450" y2="300"/>
    <line x1="450" y1="300" x2="650" y2="380"/>
    <line x1="650" y1="380" x2="850" y2="320"/>
    <line x1="850" y1="320" x2="1050" y2="380"/>
  </g>
  
  <!-- 节点圆点 -->
  <g fill="#8b5cf6" filter="url(#glow)">
    <circle cx="100" cy="100" r="6"/>
    <circle cx="200" cy="180" r="6"/>
    <circle cx="350" cy="120" r="6"/>
    <circle cx="500" cy="200" r="6"/>
    <circle cx="700" cy="150" r="6"/>
    <circle cx="900" cy="220" r="6"/>
    <circle cx="1050" cy="160" r="6"/>
    <circle cx="1100" cy="280" r="6"/>
    
    <circle cx="150" cy="450" r="6"/>
    <circle cx="300" cy="500" r="6"/>
    <circle cx="500" cy="420" r="6"/>
    <circle cx="750" cy="480" r="6"/>
    <circle cx="950" cy="400" r="6"/>
    <circle cx="1100" cy="480" r="6"/>
    
    <circle cx="80" cy="300" r="6"/>
    <circle cx="250" cy="350" r="6"/>
    <circle cx="450" cy="300" r="6"/>
    <circle cx="650" cy="380" r="6"/>
    <circle cx="850" cy="320" r="6"/>
    <circle cx="1050" cy="380" r="6"/>
  </g>
  
  <!-- 中央装饰图形 - AI芯片/神经网络抽象 -->
  <g transform="translate(600, 315)">
    <!-- 外框 -->
    <rect x="-120" y="-80" width="240" height="160" rx="20" fill="none" stroke="rgba(99,102,241,0.5)" stroke-width="2"/>
    
    <!-- 内部节点 -->
    <g fill="#6366f1">
      <circle cx="-60" cy="-40" r="8" filter="url(#glow)"/>
      <circle cx="0" cy="-40" r="8" filter="url(#glow)"/>
      <circle cx="60" cy="-40" r="8" filter="url(#glow)"/>
      <circle cx="-60" cy="0" r="8" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="10" filter="url(#glow)"/>
      <circle cx="60" cy="0" r="8" filter="url(#glow)"/>
      <circle cx="-60" cy="40" r="8" filter="url(#glow)"/>
      <circle cx="0" cy="40" r="8" filter="url(#glow)"/>
      <circle cx="60" cy="40" r="8" filter="url(#glow)"/>
    </g>
    
    <!-- 节点连线 -->
    <g stroke="#6366f1" stroke-width="1.5" opacity="0.6">
      <line x1="-60" y1="-40" x2="0" y2="-40"/>
      <line x1="0" y1="-40" x2="60" y2="-40"/>
      <line x1="-60" y1="0" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="60" y2="0"/>
      <line x1="-60" y1="40" x2="0" y2="40"/>
      <line x1="0" y1="40" x2="60" y2="40"/>
      <line x1="-60" y1="-40" x2="-60" y2="0"/>
      <line x1="-60" y1="0" x2="-60" y2="40"/>
      <line x1="0" y1="-40" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="40"/>
      <line x1="60" y1="-40" x2="60" y2="0"/>
      <line x1="60" y1="0" x2="60" y2="40"/>
    </g>
  </g>
  
  <!-- 标题文字 -->
  <text x="600" y="160" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    AI Agent系统
  </text>
  <text x="600" y="210" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="36" font-weight="bold" fill="#a5b4fc" text-anchor="middle">
    自主智能的新纪元
  </text>
  
  <!-- 副标题装饰线 -->
  <line x1="400" y1="240" x2="800" y2="240" stroke="rgba(139,92,246,0.8)" stroke-width="2"/>
  <polygon points="595,235 605,235 600,245" fill="#8b5cf6"/>
  
  <!-- 底部信息 -->
  <text x="600" y="560" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#6366f1" text-anchor="middle" opacity="0.9">
    2026.05.13
  </text>
  
  <!-- 标签装饰 -->
  <g transform="translate(600, 595)">
    <rect x="-180" y="-12" width="100" height="24" rx="12" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="-130" y="4" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">大模型</text>
    
    <rect x="-60" y="-12" width="100" height="24" rx="12" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="-10" y="4" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle">Agent系统</text>
    
    <rect x="60" y="-12" width="100" height="24" rx="12" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
    <text x="110" y="4" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle">文档AI</text>
  </g>
  
  <!-- 角落装饰 -->
  <g stroke="rgba(99,102,241,0.3)" stroke-width="1" fill="none">
    <path d="M 20 20 L 20 50 M 20 20 L 50 20"/>
    <path d="M 1180 20 L 1180 50 M 1180 20 L 1150 20"/>
    <path d="M 20 610 L 20 580 M 20 610 L 50 610"/>
    <path d="M 1180 610 L 1180 580 M 1180 610 L 1150 610"/>
  </g>
</svg>