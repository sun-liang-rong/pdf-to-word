<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e2a"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    
    <!-- Glow gradient -->
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Cyan glow -->
    <radialGradient id="cyanGlow" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Purple accent glow -->
    <radialGradient id="purpleGlow" cx="30%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    
    <!-- Node glow filter -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Text shadow -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#glowGrad)"/>
  <rect width="1200" height="630" fill="url(#cyanGlow)"/>
  <rect width="1200" height="630" fill="url(#purpleGlow)"/>
  
  <!-- Decorative neural network nodes and connections -->
  <!-- Left side network -->
  <g opacity="0.6">
    <!-- Nodes -->
    <circle cx="80" cy="100" r="5" fill="#6366f1" filter="url(#nodeGlow)"/>
    <circle cx="120" cy="200" r="4" fill="#06b6d4" filter="url(#nodeGlow)"/>
    <circle cx="70" cy="320" r="6" fill="#a855f7" filter="url(#nodeGlow)"/>
    <circle cx="130" cy="420" r="4" fill="#6366f1" filter="url(#nodeGlow)"/>
    <circle cx="90" cy="520" r="5" fill="#06b6d4" filter="url(#nodeGlow)"/>
    
    <!-- Connections -->
    <line x1="80" y1="100" x2="120" y2="200" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="120" y1="200" x2="70" y2="320" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="70" y1="320" x2="130" y2="420" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <line x1="130" y1="420" x2="90" y2="520" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="80" y1="100" x2="70" y2="320" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
    <line x1="120" y1="200" x2="130" y2="420" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
  </g>
  
  <!-- Right side network -->
  <g opacity="0.6">
    <circle cx="1120" cy="80" r="5" fill="#06b6d4" filter="url(#nodeGlow)"/>
    <circle cx="1080" cy="180" r="4" fill="#a855f7" filter="url(#nodeGlow)"/>
    <circle cx="1130" cy="300" r="6" fill="#6366f1" filter="url(#nodeGlow)"/>
    <circle cx="1070" cy="400" r="4" fill="#06b6d4" filter="url(#nodeGlow)"/>
    <circle cx="1110" cy="510" r="5" fill="#a855f7" filter="url(#nodeGlow)"/>
    
    <line x1="1120" y1="80" x2="1080" y2="180" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="1080" y1="180" x2="1130" y2="300" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <line x1="1130" y1="300" x2="1070" y2="400" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="1070" y1="400" x2="1110" y2="510" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="1120" y1="80" x2="1130" y2="300" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
    <line x1="1080" y1="180" x2="1070" y2="400" stroke="#a855f7" stroke-width="0.5" opacity="0.2"/>
  </g>
  
  <!-- Center decorative hexagon pattern -->
  <g opacity="0.15">
    <!-- Hexagon 1 -->
    <polygon points="600,140 640,165 640,215 600,240 560,215 560,165" fill="none" stroke="#6366f1" stroke-width="1"/>
    <circle cx="600" cy="190" r="3" fill="#6366f1"/>
    <!-- Hexagon 2 -->
    <polygon points="600,390 640,415 640,465 600,490 560,465 560,415" fill="none" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="600" cy="440" r="3" fill="#06b6d4"/>
    <!-- Connecting line -->
    <line x1="600" y1="240" x2="600" y2="390" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Attention pattern visualization (center) -->
  <g opacity="0.25">
    <!-- Simulated attention heatmap bars -->
    <rect x="420" y="260" width="8" height="60" rx="4" fill="#6366f1"/>
    <rect x="440" y="280" width="8" height="40" rx="4" fill="#6366f1"/>
    <rect x="460" y="250" width="8" height="70" rx="4" fill="#a855f7"/>
    <rect x="480" y="300" width="8" height="20" rx="4" fill="#06b6d4"/>
    <rect x="500" y="270" width="8" height="50" rx="4" fill="#6366f1"/>
    <rect x="520" y="265" width="8" height="55" rx="4" fill="#a855f7"/>
    <rect x="540" y="290" width="8" height="30" rx="4" fill="#06b6d4"/>
    <rect x="560" y="275" width="8" height="45" rx="4" fill="#6366f1"/>
    
    <!-- Sparse attention dots -->
    <circle cx="424" cy="230" r="3" fill="#06b6d4"/>
    <circle cx="464" cy="220" r="4" fill="#a855f7"/>
    <circle cx="504" cy="240" r="3" fill="#06b6d4"/>
    <circle cx="544" cy="250" r="3" fill="#06b6d4"/>
    <line x1="424" y1="230" x2="464" y2="220" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <line x1="464" y1="220" x2="504" y2="240" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
    <line x1="504" y1="240" x2="544" y2="250" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Corner accents -->
  <path d="M 0 0 L 60 0 L 60 10 L 10 10 L 10 60 L 0 60 Z" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <path d="M 1200 0 L 1140 0 L 1140 10 L 1190 10 L 1190 60 L 1200 60 Z" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <path d="M 0 630 L 0 570 L 10 570 L 10 620 L 60 620 L 60 630 Z" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <path d="M 1200 630 L 1200 570 L 1190 570 L 1190 620 L 1140 620 L 1140 630 Z" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  
  <!-- Main title -->
  <text x="600" y="310" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="42" font-weight="bold" fill="#ffffff" filter="url(#textShadow)">DashAttention</text>
  <text x="600" y="360" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="26" fill="#c4b5fd">可微分自适应稀疏分层注意力</text>
  
  <!-- Subtitle accent line -->
  <line x1="400" y1="395" x2="800" y2="395" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="395" r="4" fill="#6366f1"/>
  <circle cx="800" cy="395" r="4" fill="#6366f1"/>
  
  <!-- Bottom info bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#0a0e2a" opacity="0.7"/>
  
  <!-- Date -->
  <text x="60" y="605" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#94a3b8">2026年5月19日</text>
  
  <!-- Tags -->
  <g font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#06b6d4">
    <rect x="800" y="583" width="3" height="14" rx="1.5"/>
    <text x="810" y="605">LLM</text>
    <text x="855" y="605" fill="#6366f1">|</text>
    <text x="870" y="605" fill="#a855f7">稀疏注意力</text>
    <text x="955" y="605" fill="#6366f1">|</text>
    <text x="970" y="605" fill="#06b6d4">Transformer优化</text>
    <text x="1085" y="605" fill="#6366f1">|</text>
    <text x="1100" y="605" fill="#a855f7">ArXiv</text>
  </g>
  
  <!-- Author -->
  <text x="1140" y="605" text-anchor="end" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#a855f7">by Al磊</text>
</svg>
