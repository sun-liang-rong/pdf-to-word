<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b2cbf"/>
      <stop offset="100%" style="stop-color:#e040fb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#00d4ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#7b2cbf" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#7b2cbf" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#7b2cbf" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#7b2cbf" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#7b2cbf" stroke-width="1"/>
  </g>
  
  <!-- Neural network nodes -->
  <g filter="url(#glow)">
    <!-- Top left cluster -->
    <circle cx="150" cy="120" r="8" fill="#00d4ff"/>
    <circle cx="180" cy="90" r="6" fill="#7b2cbf"/>
    <circle cx="220" cy="140" r="7" fill="#00d4ff"/>
    <circle cx="100" cy="160" r="5" fill="#e040fb"/>
    <line x1="150" y1="120" x2="180" y2="90" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="150" y1="120" x2="220" y2="140" stroke="#7b2cbf" stroke-width="2" opacity="0.6"/>
    <line x1="180" y1="90" x2="220" y2="140" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="100" y1="160" x2="150" y2="120" stroke="#e040fb" stroke-width="2" opacity="0.6"/>
    
    <!-- Top right cluster -->
    <circle cx="1050" cy="100" r="7" fill="#00d4ff"/>
    <circle cx="1080" cy="140" r="6" fill="#7b2cbf"/>
    <circle cx="1020" cy="170" r="8" fill="#00d4ff"/>
    <circle cx="1100" cy="80" r="5" fill="#e040fb"/>
    <line x1="1050" y1="100" x2="1080" y2="140" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="1050" y1="100" x2="1020" y2="170" stroke="#7b2cbf" stroke-width="2" opacity="0.6"/>
    <line x1="1080" y1="140" x2="1020" y2="170" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="1100" y1="80" x2="1050" y2="100" stroke="#e040fb" stroke-width="2" opacity="0.6"/>
    
    <!-- Bottom left cluster -->
    <circle cx="120" cy="520" r="6" fill="#7b2cbf"/>
    <circle cx="160" cy="550" r="8" fill="#00d4ff"/>
    <circle cx="90" cy="480" r="5" fill="#e040fb"/>
    <line x1="120" y1="520" x2="160" y2="550" stroke="#7b2cbf" stroke-width="2" opacity="0.6"/>
    <line x1="120" y1="520" x2="90" y2="480" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    
    <!-- Bottom right cluster -->
    <circle cx="1080" cy="530" r="7" fill="#00d4ff"/>
    <circle cx="1120" cy="500" r="6" fill="#7b2cbf"/>
    <circle cx="1050" cy="470" r="8" fill="#00d4ff"/>
    <line x1="1080" y1="530" x2="1120" y2="500" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="1080" y1="530" x2="1050" y2="470" stroke="#7b2cbf" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Central AI brain icon -->
  <g transform="translate(600, 280)" filter="url(#glowStrong)">
    <!-- Brain shape -->
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="none" stroke="#00d4ff" stroke-width="3"/>
    <ellipse cx="-30" cy="-15" rx="35" ry="25" fill="none" stroke="#7b2cbf" stroke-width="2"/>
    <ellipse cx="30" cy="-15" rx="35" ry="25" fill="none" stroke="#7b2cbf" stroke-width="2"/>
    <ellipse cx="-25" cy="20" rx="30" ry="20" fill="none" stroke="#e040fb" stroke-width="2"/>
    <ellipse cx="25" cy="20" rx="30" ry="20" fill="none" stroke="#e040fb" stroke-width="2"/>
    <!-- Neural connections -->
    <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
    <line x1="-35" y1="10" x2="35" y2="10" stroke="#7b2cbf" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    DeepSeek-R1 推理模型
  </text>
  <text x="600" y="470" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="url(#accentGrad)">
    重新定义 AI 推理能力
  </text>
  
  <!-- Decorative line -->
  <line x1="400" y1="510" x2="800" y2="510" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Date and tags -->
  <text x="600" y="555" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#00d4ff" opacity="0.9">
    2026年5月14日
  </text>
  
  <!-- Tags -->
  <g transform="translate(600, 590)">
    <rect x="-200" y="-18" width="100" height="36" rx="18" fill="#7b2cbf" opacity="0.8"/>
    <text x="-50" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff">DeepSeek</text>
    
    <rect x="60" y="-18" width="100" height="36" rx="18" fill="#00d4ff" opacity="0.8"/>
    <text x="110" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#0a0e27">推理模型</text>
    
    <rect x="180" y="-18" width="120" height="36" rx="18" fill="#e040fb" opacity="0.8"/>
    <text x="240" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff">LLM 技术</text>
  </g>
  
  <!-- Corner decorations -->
  <g opacity="0.3">
    <polygon points="50,50 80,50 50,80" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="1150,50 1120,50 1150,80" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="50,580 80,580 50,550" fill="none" stroke="#7b2cbf" stroke-width="2"/>
    <polygon points="1150,580 1120,580 1150,550" fill="none" stroke="#7b2cbf" stroke-width="2"/>
  </g>
</svg>