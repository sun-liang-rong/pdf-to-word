<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="500" r="100" fill="#10b981" opacity="0.1"/>
  <circle cx="1000" cy="150" r="80" fill="#06b6d4" opacity="0.1"/>
  
  <!-- Wave pattern -->
  <g opacity="0.15">
    <path d="M 0 315 Q 300 265, 600 315 T 1200 315" stroke="#10b981" stroke-width="2" fill="none"/>
    <path d="M 0 335 Q 300 285, 600 335 T 1200 335" stroke="#06b6d4" stroke-width="2" fill="none"/>
    <path d="M 0 355 Q 300 305, 600 355 T 1200 355" stroke="#10b981" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Microphone icon -->
  <g transform="translate(200, 200)" filter="url(#glow2)">
    <rect x="35" y="0" width="30" height="60" rx="15" fill="none" stroke="url(#accent2)" stroke-width="3"/>
    <rect x="42" y="10" width="16" height="35" rx="8" fill="#10b981" opacity="0.3"/>
    <path d="M 20 35 Q 20 70 50 70 Q 80 70 80 35" fill="none" stroke="#10b981" stroke-width="3"/>
    <line x1="50" y1="70" x2="50" y2="90" stroke="#10b981" stroke-width="3"/>
    <line x1="35" y1="90" x2="65" y2="90" stroke="#10b981" stroke-width="3"/>
  </g>
  
  <!-- Sound waves -->
  <g transform="translate(850, 230)">
    <rect x="0" y="30" width="8" height="40" rx="4" fill="#06b6d4" opacity="0.8"/>
    <rect x="15" y="20" width="8" height="60" rx="4" fill="#10b981" opacity="0.8"/>
    <rect x="30" y="10" width="8" height="80" rx="4" fill="#06b6d4" opacity="0.8"/>
    <rect x="45" y="25" width="8" height="50" rx="4" fill="#10b981" opacity="0.8"/>
    <rect x="60" y="35" width="8" height="30" rx="4" fill="#06b6d4" opacity="0.8"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#f8fafc">
    低延迟语音AI技术
  </text>
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#cbd5e1">
    规模化部署实践解析
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">
    OpenAI如何实现毫秒级响应的语音AI服务
  </text>
  
  <!-- Date badge -->
  <rect x="540" y="450" width="120" height="35" rx="17" fill="#10b981" opacity="0.2"/>
  <text x="600" y="473" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#10b981" font-weight="600">
    2026-05-05
  </text>
  
  <!-- Decorative dots -->
  <circle cx="400" cy="500" r="4" fill="#10b981" opacity="0.6"/>
  <circle cx="420" cy="500" r="4" fill="#10b981" opacity="0.4"/>
  <circle cx="440" cy="500" r="4" fill="#10b981" opacity="0.2"/>
  <circle cx="760" cy="500" r="4" fill="#06b6d4" opacity="0.2"/>
  <circle cx="780" cy="500" r="4" fill="#06b6d4" opacity="0.4"/>
  <circle cx="800" cy="500" r="4" fill="#06b6d4" opacity="0.6"/>
</svg>