<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative elements -->
  <circle cx="1000" cy="150" r="200" fill="#3b82f6" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#06b6d4" opacity="0.05"/>
  
  <!-- Medical/AI Icon -->
  <g transform="translate(150, 200)" filter="url(#glow)">
    <!-- Heartbeat line -->
    <path d="M0,100 L50,100 L70,60 L90,140 L110,80 L130,100 L200,100" 
          stroke="#3b82f6" stroke-width="4" fill="none" opacity="0.8"/>
    <!-- AI brain icon -->
    <circle cx="350" cy="100" r="60" fill="none" stroke="#06b6d4" stroke-width="3"/>
    <circle cx="350" cy="100" r="40" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <circle cx="350" cy="100" r="20" fill="#06b6d4" opacity="0.3"/>
    <!-- Connection lines -->
    <line x1="200" y1="100" x2="290" y2="100" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Title -->
  <text x="150" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="52" font-weight="700" fill="#f8fafc">
    AI医疗诊断新突破
  </text>
  <text x="150" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="32" font-weight="500" fill="#94a3b8">
    哈佛研究：AI在急诊室诊断中超越人类医生
  </text>
  
  <!-- Date badge -->
  <rect x="150" y="500" width="140" height="40" rx="20" fill="url(#accentGrad)" opacity="0.9"/>
  <text x="220" y="527" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">
    2026-05-04
  </text>
  
  <!-- Category tag -->
  <rect x="310" y="500" width="100" height="40" rx="20" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="527" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="14" font-weight="500" fill="#3b82f6" text-anchor="middle">
    AI医疗
  </text>
  
  <!-- Logo area -->
  <text x="1050" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="18" font-weight="600" fill="#64748b" text-anchor="end">
    PDF转换器
  </text>
</svg>