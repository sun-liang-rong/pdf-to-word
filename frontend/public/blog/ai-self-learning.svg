<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffed4e"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰元素 -->
  <circle cx="150" cy="100" r="80" fill="#ffd700" opacity="0.1"/>
  <circle cx="1050" cy="530" r="100" fill="#667eea" opacity="0.1"/>
  <circle cx="100" cy="550" r="60" fill="#ffd700" opacity="0.1"/>
  
  <!-- AI 大脑图标 -->
  <g transform="translate(500, 120)" filter="url(#glow)">
    <!-- 大脑轮廓 -->
    <path d="M100 30 C60 30 30 60 30 100 C30 140 60 170 100 170 C140 170 170 140 170 100 C170 60 140 30 100 30" 
          fill="none" stroke="url(#brain)" stroke-width="4" opacity="0.8"/>
    
    <!-- 大脑内部神经网络 -->
    <g stroke="#667eea" stroke-width="2" opacity="0.6">
      <!-- 节点 -->
      <circle cx="70" cy="70" r="6" fill="#667eea"/>
      <circle cx="100" cy="55" r="6" fill="#764ba2"/>
      <circle cx="130" cy="70" r="6" fill="#667eea"/>
      <circle cx="60" cy="100" r="6" fill="#764ba2"/>
      <circle cx="100" cy="100" r="8" fill="url(#gold)"/>
      <circle cx="140" cy="100" r="6" fill="#764ba2"/>
      <circle cx="70" cy="130" r="6" fill="#667eea"/>
      <circle cx="130" cy="130" r="6" fill="#667eea"/>
      
      <!-- 连接线 -->
      <line x1="70" y1="70" x2="100" y2="55"/>
      <line x1="100" y1="55" x2="130" y2="70"/>
      <line x1="70" y1="70" x2="60" y2="100"/>
      <line x1="100" y1="55" x2="100" y2="100"/>
      <line x1="130" y1="70" x2="140" y2="100"/>
      <line x1="60" y1="100" x2="100" y2="100"/>
      <line x1="100" y1="100" x2="140" y2="100"/>
      <line x1="60" y1="100" x2="70" y2="130"/>
      <line x1="100" y1="100" x2="70" y2="130"/>
      <line x1="100" y1="100" x2="130" y2="130"/>
      <line x1="140" y1="100" x2="130" y2="130"/>
    </g>
    
    <!-- 自主学习循环箭头 -->
    <path d="M100 180 Q150 200 170 160 Q180 130 150 120" 
          fill="none" stroke="url(#gold)" stroke-width="3" stroke-dasharray="5,3" opacity="0.8"/>
    <polygon points="150,115 160,125 145,125" fill="url(#gold)" opacity="0.8"/>
    
    <!-- 中心发光点 -->
    <circle cx="100" cy="100" r="15" fill="url(#gold)" opacity="0.9"/>
    <text x="100" y="107" font-family="Arial" font-size="16" font-weight="bold" fill="#0f0c29" text-anchor="middle">AI</text>
  </g>
  
  <!-- 左侧：数据输入 -->
  <g transform="translate(200, 200)">
    <rect x="0" y="0" width="100" height="130" rx="8" fill="#fff" opacity="0.1"/>
    <rect x="15" y="20" width="70" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="15" y="35" width="55" height="4" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="15" y="50" width="65" height="4" rx="2" fill="#fff" opacity="0.2"/>
    <!-- 输入箭头 -->
    <path d="M100 65 L140 65 L130 55 M140 65 L130 75" stroke="#667eea" stroke-width="3" fill="none"/>
    <text x="50" y="110" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">数据输入</text>
  </g>
  
  <!-- 右侧：自主学习 -->
  <g transform="translate(850, 200)">
    <rect x="0" y="0" width="120" height="150" rx="10" fill="#fff" opacity="0.1" stroke="url(#gold)" stroke-width="2"/>
    <!-- 自我迭代符号 -->
    <circle cx="60" cy="50" r="25" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <path d="M60 25 L60 35 M85 50 L75 50 M60 75 L60 65 M35 50 L45 50" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="60" cy="50" r="8" fill="url(#gold)"/>
    
    <text x="60" y="100" font-family="Arial" font-size="14" fill="#ffd700" text-anchor="middle">自我学习</text>
    <text x="60" y="120" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">无需人类数据</text>
  </g>
  
  <!-- 融资信息 -->
  <g transform="translate(480, 420)">
    <rect x="0" y="0" width="240" height="50" rx="25" fill="url(#gold)" opacity="0.9"/>
    <text x="120" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f0c29" text-anchor="middle">💰 11亿美元融资</text>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#fff" text-anchor="middle">
    自主学习 AI 新突破
  </text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">
    David Silver 打造无需人类数据的超级学习者
  </text>
</svg>
