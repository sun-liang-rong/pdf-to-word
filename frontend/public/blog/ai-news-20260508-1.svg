<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10a37f"/>
      <stop offset="100%" style="stop-color:#19c59f"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <!-- Neural network background -->
  <g opacity="0.15">
    <circle cx="150" cy="120" r="6" fill="#10a37f"/><circle cx="300" cy="80" r="5" fill="#19c59f"/>
    <circle cx="450" cy="150" r="7" fill="#10a37f"/><circle cx="600" cy="90" r="5" fill="#19c59f"/>
    <circle cx="750" cy="130" r="6" fill="#10a37f"/><circle cx="900" cy="70" r="5" fill="#19c59f"/>
    <circle cx="1050" cy="140" r="6" fill="#10a37f"/>
    <line x1="150" y1="120" x2="300" y2="80" stroke="#10a37f" stroke-width="1" opacity="0.4"/>
    <line x1="300" y1="80" x2="450" y2="150" stroke="#10a37f" stroke-width="1" opacity="0.4"/>
    <line x1="450" y1="150" x2="600" y2="90" stroke="#10a37f" stroke-width="1" opacity="0.4"/>
    <line x1="600" y1="90" x2="750" y2="130" stroke="#10a37f" stroke-width="1" opacity="0.4"/>
    <line x1="750" y1="130" x2="900" y2="70" stroke="#10a37f" stroke-width="1" opacity="0.4"/>
    <line x1="900" y1="70" x2="1050" y2="140" stroke="#10a37f" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Sound wave / voice icon -->
  <g transform="translate(480, 160)" filter="url(#glow1)">
    <rect x="0" y="30" width="8" height="40" rx="4" fill="#10a37f" opacity="0.8"/>
    <rect x="16" y="15" width="8" height="70" rx="4" fill="#19c59f" opacity="0.9"/>
    <rect x="32" y="0" width="8" height="100" rx="4" fill="#10a37f"/>
    <rect x="48" y="20" width="8" height="60" rx="4" fill="#19c59f" opacity="0.9"/>
    <rect x="64" y="35" width="8" height="30" rx="4" fill="#10a37f" opacity="0.8"/>
    <rect x="80" y="10" width="8" height="80" rx="4" fill="#19c59f" opacity="0.85"/>
    <rect x="96" y="25" width="8" height="50" rx="4" fill="#10a37f" opacity="0.8"/>
    <rect x="112" y="5" width="8" height="90" rx="4" fill="#19c59f" opacity="0.9"/>
    <rect x="128" y="30" width="8" height="40" rx="4" fill="#10a37f" opacity="0.8"/>
    <rect x="144" y="15" width="8" height="70" rx="4" fill="#19c59f" opacity="0.85"/>
    <rect x="160" y="35" width="8" height="30" rx="4" fill="#10a37f" opacity="0.7"/>
    <rect x="176" y="20" width="8" height="60" rx="4" fill="#19c59f" opacity="0.8"/>
  </g>
  <!-- Microphone outline -->
  <g transform="translate(540, 300)">
    <rect x="30" y="0" width="40" height="70" rx="20" fill="none" stroke="#10a37f" stroke-width="3" opacity="0.6"/>
    <path d="M20 50 Q20 100 60 100 Q100 100 100 50" fill="none" stroke="#19c59f" stroke-width="3" opacity="0.5"/>
    <line x1="60" y1="100" x2="60" y2="130" stroke="#10a37f" stroke-width="3" opacity="0.5"/>
    <line x1="35" y1="130" x2="85" y2="130" stroke="#10a37f" stroke-width="3" opacity="0.5"/>
  </g>
  <!-- Tag pill -->
  <rect x="70" y="460" width="180" height="36" rx="18" fill="url(#accent1)" opacity="0.9"/>
  <text x="160" y="484" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">OpenAI API</text>
  <!-- Title -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">OpenAI Launches Voice Intelligence</text>
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">Features in Its API</text>
  <!-- Date -->
  <text x="1130" y="610" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="end">2026-05-08 | AI News</text>
</svg>