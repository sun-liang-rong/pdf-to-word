<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative elements -->
  <circle cx="1000" cy="150" r="200" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#ec4899" opacity="0.05"/>
  
  <!-- Agent/AI Icon -->
  <g transform="translate(150, 180)" filter="url(#glow)">
    <!-- Central AI node -->
    <circle cx="100" cy="100" r="50" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <circle cx="100" cy="100" r="30" fill="#8b5cf6" opacity="0.3"/>
    <!-- Orbiting nodes representing agent capabilities -->
    <circle cx="100" cy="25" r="15" fill="#ec4899" opacity="0.8"/>
    <circle cx="175" cy="100" r="15" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="100" cy="175" r="15" fill="#ec4899" opacity="0.8"/>
    <circle cx="25" cy="100" r="15" fill="#8b5cf6" opacity="0.8"/>
    <!-- Connection lines -->
    <line x1="100" y1="75" x2="100" y2="40" stroke="#64748b" stroke-width="2"/>
    <line x1="125" y1="100" x2="160" y2="100" stroke="#64748b" stroke-width="2"/>
    <line x1="100" y1="125" x2="100" y2="160" stroke="#64748b" stroke-width="2"/>
    <line x1="75" y1="100" x2="40" y2="100" stroke="#64748b" stroke-width="2"/>
    <!-- GPT-5.5 text -->
    <text x="300" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="48" font-weight="700" fill="#f8fafc">GPT-5.5</text>
    <text x="300" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="20" font-weight="500" fill="#a855f7">Agentic AI</text>
  </g>
  
  <!-- Title -->
  <text x="150" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="52" font-weight="700" fill="#f8fafc">
    GPT-5.5震撼发布
  </text>
  <text x="150" y="465" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="32" font-weight="500" fill="#94a3b8">
    OpenAI最强大的代理AI模型登场
  </text>
  
  <!-- Date badge -->
  <rect x="150" y="520" width="140" height="40" rx="20" fill="url(#accentGrad)" opacity="0.9"/>
  <text x="220" y="547" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">
    2026-05-04
  </text>
  
  <!-- Category tag -->
  <rect x="310" y="520" width="100" height="40" rx="20" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="360" y="547" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="14" font-weight="500" fill="#8b5cf6" text-anchor="middle">
    OpenAI
  </text>
  
  <!-- Logo area -->
  <text x="1050" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="18" font-weight="600" fill="#64748b" text-anchor="end">
    PDF转换器
  </text>
</svg>