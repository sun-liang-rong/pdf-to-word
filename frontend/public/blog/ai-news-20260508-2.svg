<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Grid background -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#667eea" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="525" stroke="#667eea" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="420" stroke="#667eea" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="#667eea" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="630" stroke="#667eea" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#764ba2" stroke-width="1"/>
    <line x1="1000" y1="0" x2="0" y2="525" stroke="#764ba2" stroke-width="1"/>
    <line x1="800" y1="0" x2="0" y2="420" stroke="#764ba2" stroke-width="1"/>
  </g>
  <!-- AI Assistant / Computer icon -->
  <g transform="translate(430, 120)" filter="url(#glow2)">
    <!-- Monitor -->
    <rect x="0" y="0" width="240" height="160" rx="12" fill="none" stroke="#667eea" stroke-width="3"/>
    <rect x="10" y="10" width="220" height="130" rx="6" fill="#667eea" opacity="0.08"/>
    <!-- Screen content lines -->
    <rect x="30" y="30" width="120" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="30" y="48" width="180" height="5" rx="2" fill="#764ba2" opacity="0.3"/>
    <rect x="30" y="62" width="150" height="5" rx="2" fill="#667eea" opacity="0.25"/>
    <rect x="30" y="76" width="170" height="5" rx="2" fill="#764ba2" opacity="0.3"/>
    <rect x="30" y="90" width="100" height="5" rx="2" fill="#667eea" opacity="0.25"/>
    <!-- Cursor blink -->
    <rect x="30" y="105" width="3" height="14" rx="1" fill="#667eea" opacity="0.8"/>
    <!-- Stand -->
    <rect x="95" y="160" width="50" height="20" fill="#667eea" opacity="0.3"/>
    <rect x="70" y="180" width="100" height="8" rx="4" fill="#667eea" opacity="0.4"/>
    <!-- AI sparkle -->
    <g transform="translate(180, 20)">
      <path d="M15 0 L18 10 L28 10 L20 16 L23 28 L15 20 L7 28 L10 16 L2 10 L12 10 Z" fill="#764ba2" opacity="0.7"/>
    </g>
  </g>
  <!-- Floating document icons -->
  <g transform="translate(200, 300)" opacity="0.2">
    <rect x="0" y="0" width="60" height="80" rx="6" fill="#667eea"/>
    <rect x="8" y="12" width="35" height="4" rx="2" fill="#fff"/>
    <rect x="8" y="22" width="28" height="3" rx="1" fill="#fff"/>
    <rect x="8" y="30" width="40" height="3" rx="1" fill="#fff"/>
  </g>
  <g transform="translate(860, 250)" opacity="0.15">
    <rect x="0" y="0" width="70" height="90" rx="6" fill="#764ba2"/>
    <rect x="10" y="15" width="40" height="4" rx="2" fill="#fff"/>
    <rect x="10" y="25" width="32" height="3" rx="1" fill="#fff"/>
    <rect x="10" y="33" width="45" height="3" rx="1" fill="#fff"/>
  </g>
  <!-- Tag pill -->
  <rect x="70" y="460" width="200" height="36" rx="18" fill="url(#accent2)" opacity="0.9"/>
  <text x="170" y="484" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">AI Productivity</text>
  <!-- Title -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">Perplexity's AI Personal Computer</text>
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">Now Available on Mac</text>
  <!-- Date -->
  <text x="1130" y="610" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="end">2026-05-08 | AI News</text>
</svg>