<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="pdf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="200" cy="500" r="80" fill="#3498db" opacity="0.1"/>
  <circle cx="1000" cy="150" r="100" fill="#e74c3c" opacity="0.1"/>
  
  <!-- PDF 文档（左侧） -->
  <g transform="translate(250, 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="260" rx="10" fill="url(#pdf)"/>
    <!-- 文档内容线条 -->
    <rect x="20" y="30" width="160" height="8" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="20" y="55" width="120" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="75" width="140" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="95" width="100" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="115" width="130" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <!-- 图片占位 -->
    <rect x="20" y="140" width="70" height="50" rx="4" fill="#fff" opacity="0.2"/>
    <rect x="100" y="140" width="80" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="100" y="155" width="60" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="100" y="170" width="70" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <!-- PDF 标签 -->
    <text x="100" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">PDF</text>
  </g>
  
  <!-- 转换箭头 -->
  <g transform="translate(500, 260)">
    <!-- 箭头背景 -->
    <circle cx="100" cy="40" r="50" fill="#f39c12" opacity="0.2"/>
    <!-- 箭头 -->
    <path d="M50 40 L130 40 L110 20 M130 40 L110 60" stroke="#f39c12" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 转换文字 -->
    <text x="100" y="110" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f39c12" text-anchor="middle">转换</text>
    <!-- 保留格式标记 -->
    <g transform="translate(70, -30)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#27ae60" opacity="0.9"/>
      <text x="30" y="17" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">保留格式</text>
    </g>
  </g>
  
  <!-- Word 文档（右侧） -->
  <g transform="translate(750, 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="260" rx="10" fill="url(#word)"/>
    <!-- 文档内容线条（与PDF对应） -->
    <rect x="20" y="30" width="160" height="8" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="20" y="55" width="120" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="75" width="140" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="95" width="100" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="115" width="130" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <!-- 图片占位（与PDF对应） -->
    <rect x="20" y="140" width="70" height="50" rx="4" fill="#fff" opacity="0.2"/>
    <rect x="100" y="140" width="80" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="100" y="155" width="60" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="100" y="170" width="70" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <!-- Word 标签 -->
    <text x="100" y="230" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">DOCX</text>
  </g>
  
  <!-- 格式保留指示 -->
  <g transform="translate(480, 450)">
    <g transform="translate(0, 0)">
      <circle cx="20" cy="20" r="15" fill="#27ae60" opacity="0.9"/>
      <text x="20" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">✓</text>
      <text x="45" y="25" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">文字保留</text>
    </g>
    <g transform="translate(140, 0)">
      <circle cx="20" cy="20" r="15" fill="#27ae60" opacity="0.9"/>
      <text x="20" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">✓</text>
      <text x="45" y="25" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">图片保留</text>
    </g>
    <g transform="translate(280, 0)">
      <circle cx="20" cy="20" r="15" fill="#27ae60" opacity="0.9"/>
      <text x="20" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">✓</text>
      <text x="45" y="25" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">排版保留</text>
    </g>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#fff" text-anchor="middle">
    PDF 转 Word 格式保留指南
  </text>
</svg>
