<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="ai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f260"/>
      <stop offset="100%" style="stop-color:#0575e6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 神经网络背景 -->
  <g opacity="0.3">
    <!-- 节点 -->
    <circle cx="200" cy="150" r="8" fill="#00f260"/>
    <circle cx="400" cy="100" r="8" fill="#00f260"/>
    <circle cx="600" cy="180" r="8" fill="#00f260"/>
    <circle cx="800" cy="120" r="8" fill="#00f260"/>
    <circle cx="1000" cy="200" r="8" fill="#00f260"/>
    
    <circle cx="150" cy="300" r="8" fill="#0575e6"/>
    <circle cx="350" cy="350" r="8" fill="#0575e6"/>
    <circle cx="550" cy="280" r="8" fill="#0575e6"/>
    <circle cx="750" cy="380" r="8" fill="#0575e6"/>
    <circle cx="950" cy="320" r="8" fill="#0575e6"/>
    
    <circle cx="250" cy="500" r="8" fill="#00f260"/>
    <circle cx="450" cy="480" r="8" fill="#00f260"/>
    <circle cx="650" cy="520" r="8" fill="#00f260"/>
    <circle cx="850" cy="460" r="8" fill="#00f260"/>
    <circle cx="1050" cy="500" r="8" fill="#00f260"/>
    
    <!-- 连接线 -->
    <line x1="200" y1="150" x2="400" y2="100" stroke="#00f260" stroke-width="1" opacity="0.5"/>
    <line x1="400" y1="100" x2="600" y2="180" stroke="#00f260" stroke-width="1" opacity="0.5"/>
    <line x1="600" y1="180" x2="800" y2="120" stroke="#00f260" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="120" x2="1000" y2="200" stroke="#00f260" stroke-width="1" opacity="0.5"/>
    
    <line x1="200" y1="150" x2="150" y2="300" stroke="#0575e6" stroke-width="1" opacity="0.5"/>
    <line x1="400" y1="100" x2="350" y2="350" stroke="#0575e6" stroke-width="1" opacity="0.5"/>
    <line x1="600" y1="180" x2="550" y2="280" stroke="#0575e6" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="120" x2="750" y2="380" stroke="#0575e6" stroke-width="1" opacity="0.5"/>
    <line x1="1000" y1="200" x2="950" y2="320" stroke="#0575e6" stroke-width="1" opacity="0.5"/>
    
    <line x1="150" y1="300" x2="250" y2="500" stroke="#00f260" stroke-width="1" opacity="0.5"/>
    <line x1="350" y1="350" x2="450" y2="480" stroke="#00f260" stroke-width="1" opacity="0.5"/>
    <line x1="550" y1="280" x2="650" y2="520" stroke="#00f260" stroke-width="1" opacity="0.5"/>
    <line x1="750" y1="380" x2="850" y2="460" stroke="#00f260" stroke-width="1" opacity="0.5"/>
    <line x1="950" y1="320" x2="1050" y2="500" stroke="#00f260" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- AI 大脑图标 -->
  <g transform="translate(500, 180)" filter="url(#glow)">
    <!-- 大脑轮廓 -->
    <path d="M100 20 C60 20 30 50 30 90 C30 130 60 160 100 160 C140 160 170 130 170 90 C170 50 140 20 100 20" 
          fill="none" stroke="url(#ai)" stroke-width="4"/>
    <!-- 大脑内部线条 -->
    <path d="M50 70 Q80 60 100 80 T150 70" fill="none" stroke="#00f260" stroke-width="2" opacity="0.8"/>
    <path d="M45 100 Q75 90 100 110 T155 100" fill="none" stroke="#0575e6" stroke-width="2" opacity="0.8"/>
    <path d="M60 130 Q85 120 100 135 T140 130" fill="none" stroke="#00f260" stroke-width="2" opacity="0.8"/>
    <!-- 发光点 -->
    <circle cx="70" cy="60" r="5" fill="#00f260"/>
    <circle cx="130" cy="70" r="5" fill="#0575e6"/>
    <circle cx="90" cy="120" r="5" fill="#00f260"/>
    <circle cx="120" cy="110" r="5" fill="#0575e6"/>
  </g>
  
  <!-- 文档图标 -->
  <g transform="translate(250, 200)">
    <rect x="0" y="0" width="120" height="150" rx="8" fill="#fff" opacity="0.1"/>
    <rect x="15" y="20" width="90" height="6" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="15" y="40" width="70" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="15" y="55" width="80" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="15" y="70" width="60" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <!-- AI 处理指示 -->
    <circle cx="60" cy="110" r="20" fill="url(#ai)" opacity="0.8"/>
    <text x="60" y="116" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">AI</text>
  </g>
  
  <!-- 输出文档 -->
  <g transform="translate(830, 200)">
    <rect x="0" y="0" width="120" height="150" rx="8" fill="#fff" opacity="0.1"/>
    <rect x="15" y="20" width="90" height="6" rx="2" fill="#00f260" opacity="0.6"/>
    <rect x="15" y="40" width="70" height="4" rx="2" fill="#00f260" opacity="0.4"/>
    <rect x="15" y="55" width="80" height="4" rx="2" fill="#00f260" opacity="0.4"/>
    <rect x="15" y="70" width="60" height="4" rx="2" fill="#00f260" opacity="0.4"/>
    <!-- 完成标记 -->
    <circle cx="60" cy="110" r="20" fill="#27ae60" opacity="0.9"/>
    <text x="60" y="118" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">✓</text>
  </g>
  
  <!-- 处理箭头 -->
  <g transform="translate(400, 260)">
    <path d="M0 20 L80 20 L65 5 M80 20 L65 35" stroke="url(#ai)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#glow)">
    AI 智能文档处理
  </text>
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">
    人工智能革新 PDF 处理方式
  </text>
</svg>
