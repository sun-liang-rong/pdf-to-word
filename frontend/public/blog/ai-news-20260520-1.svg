<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#1e0a3e"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b2cbf"/>
      <stop offset="100%" style="stop-color:#e040fb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative network nodes -->
  <g stroke="rgba(0,212,255,0.3)" stroke-width="1" fill="none">
    <line x1="100" y1="100" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="350" y2="120"/>
    <line x1="350" y1="120" x2="500" y2="180"/>
    <line x1="500" y1="180" x2="650" y2="140"/>
    <line x1="650" y1="140" x2="800" y2="190"/>
    <line x1="800" y1="190" x2="950" y2="150"/>
    <line x1="950" y1="150" x2="1100" y2="100"/>
    
    <line x1="150" y1="530" x2="300" y2="480"/>
    <line x1="300" y1="480" x2="450" y2="520"/>
    <line x1="450" y1="520" x2="600" y2="470"/>
    <line x1="600" y1="470" x2="750" y2="510"/>
    <line x1="750" y1="510" x2="900" y2="470"/>
    <line x1="900" y1="470" x2="1050" y2="520"/>
    
    <line x1="100" y1="315" x2="300" y2="315"/>
    <line x1="900" y1="315" x2="1100" y2="315"/>
  </g>
  
  <!-- Nodes -->
  <g fill="#00d4ff" filter="url(#glow)">
    <circle cx="100" cy="100" r="5"/>
    <circle cx="200" cy="150" r="5"/>
    <circle cx="350" cy="120" r="5"/>
    <circle cx="500" cy="180" r="5"/>
    <circle cx="650" cy="140" r="5"/>
    <circle cx="800" cy="190" r="5"/>
    <circle cx="950" cy="150" r="5"/>
    <circle cx="1100" cy="100" r="5"/>
    
    <circle cx="150" cy="530" r="5"/>
    <circle cx="300" cy="480" r="5"/>
    <circle cx="450" cy="520" r="5"/>
    <circle cx="600" cy="470" r="5"/>
    <circle cx="750" cy="510" r="5"/>
    <circle cx="900" cy="470" r="5"/>
    <circle cx="1050" cy="520" r="5"/>
    
    <circle cx="100" cy="315" r="5"/>
    <circle cx="300" cy="315" r="5"/>
    <circle cx="900" cy="315" r="5"/>
    <circle cx="1100" cy="315" r="5"/>
  </g>
  
  <!-- Central hexagon pattern -->
  <g stroke="rgba(123,44,191,0.5)" stroke-width="2" fill="none">
    <polygon points="600,200 643,225 643,275 600,300 557,275 557,225"/>
    <polygon points="600,215 630,232 630,268 600,285 570,268 570,232"/>
  </g>
  
  <!-- Main content area -->
  <rect x="150" y="180" width="900" height="270" rx="20" fill="rgba(10,10,46,0.7)" stroke="rgba(0,212,255,0.3)" stroke-width="2"/>
  
  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="48" font-weight="bold" fill="white" filter="url(#softGlow)">DeepSeek R1</text>
  <text x="600" y="330" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#accentGradient)">推理模型的崛起</text>
  
  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">从思维链到系统级推理：AI 推理能力的范式革命</text>
  
  <!-- Bottom info bar -->
  <rect x="0" y="550" width="1200" height="80" fill="rgba(0,0,0,0.5)"/>
  <text x="600" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">2026年5月20日</text>
  <text x="600" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(0,212,255,0.8)">AI · 大模型 · 推理能力 · DeepSeek</text>
  
  <!-- Corner decorations -->
  <g stroke="rgba(224,64,251,0.4)" stroke-width="2" fill="none">
    <path d="M20,20 L80,20 L80,40 M20,20 L20,80"/>
    <path d="M1180,20 L1120,20 L1120,40 M1180,20 L1180,80"/>
    <path d="M20,610 L80,610 L80,590 M20,610 L20,550"/>
    <path d="M1180,610 L1120,610 L1120,590 M1180,610 L1180,550"/>
  </g>
</svg>