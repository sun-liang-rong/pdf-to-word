<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect for text -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Network nodes and connections -->
  <g opacity="0.3">
    <!-- Top left cluster -->
    <circle cx="150" cy="120" r="8" fill="#00d4ff" stroke="#ffffff" stroke-width="1"/>
    <circle cx="200" cy="100" r="6" fill="#00d4ff" stroke="#ffffff" stroke-width="1"/>
    <circle cx="180" cy="160" r="7" fill="#00d4ff" stroke="#ffffff" stroke-width="1"/>
    <line x1="150" y1="120" x2="200" y2="100" stroke="#00d4ff" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="150" y1="120" x2="180" y2="160" stroke="#00d4ff" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Center cluster -->
    <circle cx="600" cy="315" r="12" fill="#7c3aed" stroke="#ffffff" stroke-width="2"/>
    <circle cx="650" cy="290" r="9" fill="#7c3aed" stroke="#ffffff" stroke-width="1"/>
    <circle cx="580" cy="350" r="10" fill="#7c3aed" stroke="#ffffff" stroke-width="1"/>
    <circle cx="700" cy="340" r="8" fill="#7c3aed" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="315" x2="650" y2="290" stroke="#7c3aed" stroke-width="2"/>
    <line x1="600" y1="315" x2="580" y2="350" stroke="#7c3aed" stroke-width="2"/>
    <line x1="600" y1="315" x2="700" y2="340" stroke="#7c3aed" stroke-width="2"/>
    
    <!-- Bottom right cluster -->
    <circle cx="1050" cy="510" r="8" fill="#06b6d4" stroke="#ffffff" stroke-width="1"/>
    <circle cx="1100" cy="490" r="6" fill="#06b6d4" stroke="#ffffff" stroke-width="1"/>
    <circle cx="1080" cy="550" r="7" fill="#06b6d4" stroke="#ffffff" stroke-width="1"/>
    <line x1="1050" y1="510" x2="1100" y2="490" stroke="#06b6d4" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="1050" y1="510" x2="1080" y2="550" stroke="#06b6d4" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  
  <!-- Geometric shapes -->
  <polygon points="200,80 220,120 180,120" fill="#ffffff" opacity="0.1"/>
  <polygon points="1000,550 1020,590 980,590" fill="#ffffff" opacity="0.1"/>
  <rect x="800" y="100" width="40" height="40" fill="#ffffff" opacity="0.05" transform="rotate(45 820 120)"/>
  
  <!-- Main title -->
  <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" filter="url(#textGlow)">
    2026年大模型技术突破
  </text>
  
  <text x="600" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="normal" fill="#e0e7ff">
    多模态融合与推理效率革命
  </text>
  
  <!-- Bottom section with date and tags -->
  <g transform="translate(0, 550)">
    <!-- Date -->
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="18" fill="#a5b4fc">
      2026年5月12日
    </text>
    
    <!-- Tags -->
    <g transform="translate(1000, 0)">
      <rect x="-150" y="-15" rx="20" ry="20" width="140" height="30" fill="#4c1d95" opacity="0.7"/>
      <text x="-70" y="12" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">
        大模型
      </text>
      
      <rect x="-280" y="-15" rx="20" ry="20" width="140" height="30" fill="#4c1d95" opacity="0.7"/>
      <text x="-200" y="12" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">
        多模态学习
      </text>
      
      <rect x="-410" y="-15" rx="20" ry="20" width="140" height="30" fill="#4c1d95" opacity="0.7"/>
      <text x="-330" y="12" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">
        推理优化
      </text>
      
      <rect x="-540" y="-15" rx="20" ry="20" width="140" height="30" fill="#4c1d95" opacity="0.7"/>
      <text x="-460" y="12" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">
        文档AI
      </text>
    </g>
  </g>
  
  <!-- Decorative lines -->
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#3730a3" stroke-width="2" opacity="0.3"/>
</svg>