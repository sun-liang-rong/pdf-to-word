<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="compress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="50%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="150" cy="100" r="60" fill="#e74c3c" opacity="0.1"/>
  <circle cx="1050" cy="530" r="100" fill="#27ae60" opacity="0.1"/>
  
  <!-- 大文件 -->
  <g transform="translate(300, 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="250" rx="10" fill="#e74c3c"/>
    <rect x="20" y="20" width="160" height="12" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="20" y="50" width="120" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="75" width="140" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="100" width="100" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="125" width="130" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="20" y="150" width="110" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <!-- 文件大小 -->
    <text x="100" y="210" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">25MB</text>
  </g>
  
  <!-- 压缩箭头 -->
  <g transform="translate(560, 250)">
    <path d="M0 50 L80 50 L60 30 M80 50 L60 70" stroke="url(#compress)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="100" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f39c12" text-anchor="middle">压缩</text>
  </g>
  
  <!-- 小文件 -->
  <g transform="translate(700, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="200" rx="10" fill="#27ae60"/>
    <rect x="15" y="15" width="130" height="10" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="15" y="40" width="100" height="8" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="15" y="60" width="110" height="8" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="15" y="80" width="90" height="8" rx="2" fill="#fff" opacity="0.3"/>
    <!-- 文件大小 -->
    <text x="80" y="140" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">5MB</text>
  </g>
  
  <!-- 压缩率指示 -->
  <g transform="translate(900, 200)">
    <circle cx="60" cy="60" r="50" fill="#27ae60" opacity="0.2"/>
    <text x="60" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#27ae60" text-anchor="middle">-80%</text>
    <text x="60" y="85" font-family="Arial, sans-serif" font-size="14" fill="#27ae60" text-anchor="middle">体积减少</text>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">
    PDF 文件压缩指南
  </text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">
    5种方法快速减小文件体积
  </text>
</svg>
