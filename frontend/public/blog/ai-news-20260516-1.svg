<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b69;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7b2ff7" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Tech grid pattern -->
  <g opacity="0.15">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#00d4ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00d4ff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00d4ff" stroke-width="1"/>
  </g>
  
  <!-- Network nodes - left side -->
  <g filter="url(#glow)">
    <circle cx="120" cy="180" r="8" fill="#00d4ff"/>
    <circle cx="80" cy="280" r="6" fill="#7b2ff7"/>
    <circle cx="160" cy="380" r="10" fill="#00d4ff"/>
    <circle cx="100" cy="480" r="7" fill="#7b2ff7"/>
    <line x1="120" y1="180" x2="80" y2="280" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="280" x2="160" y2="380" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
    <line x1="160" y1="380" x2="100" y2="480" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Network nodes - right side -->
  <g filter="url(#glow)">
    <circle cx="1080" cy="150" r="9" fill="#7b2ff7"/>
    <circle cx="1120" cy="260" r="7" fill="#00d4ff"/>
    <circle cx="1040" cy="370" r="11" fill="#7b2ff7"/>
    <circle cx="1100" cy="470" r="6" fill="#00d4ff"/>
    <line x1="1080" y1="150" x2="1120" y2="260" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
    <line x1="1120" y1="260" x2="1040" y2="370" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="1040" y1="370" x2="1100" y2="470" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Central geometric decorations -->
  <g opacity="0.3" filter="url(#glow)">
    <polygon points="600,80 640,140 560,140" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="600,500 560,560 640,560" fill="none" stroke="#7b2ff7" stroke-width="2"/>
    <circle cx="600" cy="60" r="20" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="600" cy="570" r="15" fill="none" stroke="#7b2ff7" stroke-width="2"/>
  </g>
  
  <!-- Hexagon decorations -->
  <g opacity="0.25">
    <polygon points="280,120 310,140 310,180 280,200 250,180 250,140" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <polygon points="920,450 950,470 950,510 920,530 890,510 890,470" fill="none" stroke="#7b2ff7" stroke-width="1.5"/>
  </g>
  
  <!-- Main title with glow effect -->
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">
    RAG vs 长上下文
  </text>
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#accentGrad)" text-anchor="middle" filter="url(#glow)">
    大模型文档处理技术路线深度对比
  </text>
  
  <!-- Decorative line under title -->
  <line x1="350" y1="360" x2="850" y2="360" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Bottom info bar -->
  <rect x="0" y="540" width="1200" height="90" fill="rgba(10,10,46,0.8)" opacity="0.9"/>
  
  <!-- Date -->
  <text x="600" y="575" font-family="Arial, sans-serif" font-size="16" fill="#888" text-anchor="middle">
    2026年5月16日
  </text>
  
  <!-- Tags -->
  <g font-family="Arial, sans-serif" font-size="14" filter="url(#glow)">
    <rect x="380" y="590" width="100" height="26" rx="13" fill="rgba(0,212,255,0.2)" stroke="#00d4ff" stroke-width="1"/>
    <text x="430" y="608" fill="#00d4ff" text-anchor="middle">RAG</text>
    
    <rect x="500" y="590" width="140" height="26" rx="13" fill="rgba(123,47,247,0.2)" stroke="#7b2ff7" stroke-width="1"/>
    <text x="570" y="608" fill="#7b2ff7" text-anchor="middle">长上下文</text>
    
    <rect x="660" y="590" width="120" height="26" rx="13" fill="rgba(0,212,255,0.2)" stroke="#00d4ff" stroke-width="1"/>
    <text x="720" y="608" fill="#00d4ff" text-anchor="middle">大模型</text>
    
    <rect x="800" y="590" width="120" height="26" rx="13" fill="rgba(123,47,247,0.2)" stroke="#7b2ff7" stroke-width="1"/>
    <text x="860" y="608" fill="#7b2ff7" text-anchor="middle">AI文档处理</text>
  </g>
  
  <!-- Corner decorations -->
  <g opacity="0.4">
    <path d="M0,0 L80,0 L0,80 Z" fill="url(#accentGrad)"/>
    <path d="M1200,630 L1120,630 L1200,550 Z" fill="url(#accentGrad)"/>
  </g>
</svg>