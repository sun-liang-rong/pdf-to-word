<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#229954"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="150" cy="150" r="60" fill="#e74c3c" opacity="0.1"/>
  <circle cx="1050" cy="480" r="80" fill="#27ae60" opacity="0.1"/>
  
  <!-- 步骤 1 -->
  <g transform="translate(200, 180)" filter="url(#shadow)">
    <circle cx="50" cy="50" r="50" fill="url(#step1)"/>
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    <rect x="20" y="120" width="140" height="100" rx="8" fill="#fff" opacity="0.1"/>
    <rect x="30" y="135" width="100" height="6" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="30" y="150" width="80" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="30" y="162" width="90" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <text x="90" y="210" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">上传文件</text>
  </g>
  
  <!-- 箭头 1 -->
  <path d="M360 230 L440 230 L420 210 M440 230 L420 250" stroke="#f39c12" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  
  <!-- 步骤 2 -->
  <g transform="translate(480, 180)" filter="url(#shadow)">
    <circle cx="50" cy="50" r="50" fill="url(#step2)"/>
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    <rect x="20" y="120" width="140" height="100" rx="8" fill="#fff" opacity="0.1"/>
    <rect x="35" y="140" width="30" height="30" rx="4" fill="#fff" opacity="0.2"/>
    <rect x="75" y="145" width="70" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="75" y="155" width="50" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <text x="90" y="210" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">自动处理</text>
  </g>
  
  <!-- 箭头 2 -->
  <path d="M640 230 L720 230 L700 210 M720 230 L700 250" stroke="#f39c12" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  
  <!-- 步骤 3 -->
  <g transform="translate(760, 180)" filter="url(#shadow)">
    <circle cx="50" cy="50" r="50" fill="url(#step3)"/>
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
    <rect x="20" y="120" width="140" height="100" rx="8" fill="#fff" opacity="0.1"/>
    <rect x="30" y="135" width="100" height="6" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="30" y="150" width="80" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="30" y="162" width="90" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <text x="90" y="210" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">下载结果</text>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">
    简单三步，轻松转换
  </text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">
    快速上手的 PDF 转换教程
  </text>
</svg>
