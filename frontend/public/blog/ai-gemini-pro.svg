<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="50%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#3949ab"/>
    </linearGradient>
    <linearGradient id="gemini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="50%" style="stop-color:#34a853"/>
      <stop offset="100%" style="stop-color:#fbbc04"/>
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#34a853"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰元素 -->
  <circle cx="150" cy="100" r="80" fill="#4285f4" opacity="0.1"/>
  <circle cx="1050" cy="530" r="100" fill="#34a853" opacity="0.1"/>
  <circle cx="100" cy="550" r="60" fill="#fbbc04" opacity="0.1"/>
  
  <!-- Gemini 标志 -->
  <g transform="translate(500, 100)" filter="url(#glow)">
    <!-- 六边形 -->
    <polygon points="100,20 180,65 180,145 100,190 20,145 20,65" 
             fill="none" stroke="url(#gemini)" stroke-width="4" opacity="0.8"/>
    
    <!-- 内部图案 -->
    <g transform="translate(100, 105)">
      <!-- 双星/双子符号 -->
      <circle cx="-25" cy="0" r="20" fill="none" stroke="#4285f4" stroke-width="3"/>
      <circle cx="25" cy="0" r="20" fill="none" stroke="#34a853" stroke-width="3"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#fbbc04" stroke-width="3"/>
      
      <!-- 发光点 -->
      <circle cx="-25" cy="0" r="5" fill="#4285f4"/>
      <circle cx="25" cy="0" r="5" fill="#34a853"/>
    </g>
    
    <!-- Gemini 文字 -->
    <text x="100" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">Gemini</text>
    <text x="100" y="255" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">1.5 Pro</text>
  </g>
  
  <!-- 左侧：文档堆叠 -->
  <g transform="translate(200, 180)">
    <!-- 文档 1 -->
    <rect x="0" y="40" width="100" height="130" rx="8" fill="#fff" opacity="0.1"/>
    <rect x="15" y="60" width="70" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="15" y="80" width="55" height="4" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="15" y="100" width="65" height="4" rx="2" fill="#fff" opacity="0.2"/>
    
    <!-- 文档 2 -->
    <rect x="20" y="20" width="100" height="130" rx="8" fill="#fff" opacity="0.15"/>
    <rect x="35" y="40" width="70" height="5" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="35" y="60" width="55" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="35" y="80" width="65" height="4" rx="2" fill="#fff" opacity="0.3"/>
    
    <!-- 文档 3 -->
    <rect x="40" y="0" width="100" height="130" rx="8" fill="#fff" opacity="0.2"/>
    <rect x="55" y="20" width="70" height="5" rx="2" fill="#4285f4" opacity="0.6"/>
    <rect x="55" y="40" width="55" height="4" rx="2" fill="#34a853" opacity="0.4"/>
    <rect x="55" y="60" width="65" height="4" rx="2" fill="#fbbc04" opacity="0.4"/>
  </g>
  
  <!-- 右侧：处理后的智能文档 -->
  <g transform="translate(850, 180)">
    <rect x="0" y="0" width="140" height="180" rx="10" fill="#fff" opacity="0.1" stroke="url(#gemini)" stroke-width="2"/>
    <!-- 高亮内容 -->
    <rect x="15" y="20" width="110" height="8" rx="4" fill="#4285f4" opacity="0.6"/>
    <rect x="15" y="40" width="85" height="5" rx="2" fill="#34a853" opacity="0.4"/>
    <rect x="15" y="55" width="95" height="5" rx="2" fill="#fbbc04" opacity="0.4"/>
    <rect x="15" y="70" width="75" height="5" rx="2" fill="#4285f4" opacity="0.4"/>
    <!-- 分析结果 -->
    <rect x="15" y="95" width="110" height="70" rx="6" fill="url(#doc)" opacity="0.2"/>
    <text x="70" y="120" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">100万 Token</text>
    <text x="70" y="140" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">超长上下文</text>
    <text x="70" y="155" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">750页文档</text>
  </g>
  
  <!-- 处理箭头 -->
  <g transform="translate(380, 260)">
    <path d="M0 20 L100 20 L85 5 M100 20 L85 35" stroke="url(#gemini)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <g transform="translate(620, 260)">
    <path d="M0 20 L100 20 L85 5 M100 20 L85 35" stroke="url(#gemini)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 能力标签 -->
  <g transform="translate(480, 420)">
    <rect x="0" y="0" width="240" height="50" rx="25" fill="url(#gemini)" opacity="0.9"/>
    <text x="120" y="33" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">🚀 100万 Token 上下文</text>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#fff" text-anchor="middle">
    Gemini 1.5 Pro 全面开放
  </text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">
    超长上下文重塑文档处理方式
  </text>
</svg>
